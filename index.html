<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>BenchPress Pro</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }
  #app { display: flex; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }

  /* ===== NAV ===== */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--bg3);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px 4px 6px; border: none; background: none;
    color: var(--text2); font-size: 10px; cursor: pointer;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--accent2); }
  .nav-btn svg { width: 24px; height: 24px; margin-bottom: 2px; }

  /* ===== HEADER ===== */
  .header {
    background: var(--bg2);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    border-bottom: 1px solid var(--bg3);
    position: sticky; top: 0; z-index: 50;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* ===== SCREENS ===== */
  .screen {
    display: none; flex: 1;
    padding: 16px 16px calc(80px + var(--safe-bottom));
    overflow-y: auto;
  }
  .screen.active { display: block; }

  /* ===== CARDS ===== */
  .card {
    background: var(--bg2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--accent2);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
  }

  /* ===== FORM ===== */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  input, select {
    width: 100%; padding: 12px 14px;
    background: var(--bg3); border: 1px solid transparent;
    border-radius: 10px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color .2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg2); }

  /* ===== BUTTONS ===== */
  .btn {
    display: block; width: 100%; padding: 14px;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.98); opacity: .85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--green); color: white; }
  .btn-outline {
    background: transparent; color: var(--accent2);
    border: 1.5px solid var(--accent);
  }
  .btn-sm {
    padding: 8px 14px; font-size: 14px; width: auto; display: inline-block;
  }
  .btn-danger { background: var(--red); color: white; }

  /* ===== BADGES ===== */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-blue { background: rgba(59,130,246,.2); color: var(--accent2); }
  .badge-green { background: rgba(34,197,94,.2); color: var(--green); }
  .badge-yellow { background: rgba(245,158,11,.2); color: var(--yellow); }
  .badge-red { background: rgba(239,68,68,.2); color: var(--red); }

  /* ===== PROGRAM ===== */
  .week-card { background: var(--bg2); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .week-header {
    padding: 12px 16px; background: var(--bg3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .week-header h3 { font-size: 15px; font-weight: 700; }
  .session-row {
    padding: 14px 16px; border-bottom: 1px solid var(--bg3);
    cursor: pointer; transition: background .15s;
  }
  .session-row:last-child { border-bottom: none; }
  .session-row:active { background: var(--bg3); }
  .session-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .session-date { font-size: 14px; font-weight: 600; }
  .session-type { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .sets-preview { font-size: 12px; color: var(--text2); }

  /* ===== WORKOUT ===== */
  .phase-label {
    font-size: 12px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin: 16px 0 8px; padding-left: 4px;
  }
  .set-row {
    display: flex; align-items: center;
    background: var(--bg2); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px;
    gap: 12px;
  }
  .set-num { font-size: 14px; font-weight: 700; color: var(--text2); width: 32px; }
  .set-info { flex: 1; }
  .set-weight { font-size: 18px; font-weight: 700; }
  .set-reps { font-size: 13px; color: var(--text2); }
  .set-done {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid var(--bg3); background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .set-done.checked { background: var(--green); border-color: var(--green); }
  .set-done svg { width: 18px; height: 18px; }
  .inol-bar-wrap { margin-top: 8px; }
  .inol-bar-bg { background: var(--bg3); border-radius: 4px; height: 6px; margin-top: 4px; }
  .inol-bar-fill { height: 6px; border-radius: 4px; transition: width .5s; }

  /* ===== RECORDS ===== */
  .record-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--bg3);
  }
  .record-row:last-child { border-bottom: none; }

  /* ===== ANALYSIS ===== */
  .chart-wrap { position: relative; height: 220px; margin: 8px 0; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box {
    background: var(--bg3); border-radius: 10px; padding: 14px;
    text-align: center;
  }
  .stat-val { font-size: 26px; font-weight: 800; color: var(--accent2); }
  .stat-unit { font-size: 12px; }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ===== THEORY ===== */
  .theory-section { margin-bottom: 20px; }
  .theory-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--accent2); }
  .theory-section p { font-size: 14px; line-height: 1.7; color: var(--text2); }
  .theory-section ul { padding-left: 18px; }
  .theory-section li { font-size: 14px; line-height: 1.8; color: var(--text2); }

  /* ===== MISC ===== */
  .divider { height: 1px; background: var(--bg3); margin: 12px 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .max-day-badge {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: white; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700;
  }
  .progress-ring { display: flex; align-items: center; gap: 12px; }
  .ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom)); width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; }

  /* ===== INPUT LOG ===== */
  .log-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .log-input-row input { flex: 1; }
  .rpe-dots { display: flex; gap: 6px; }
  .rpe-dot {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--bg3);
    background: none; color: var(--text2); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .rpe-dot.active { border-color: var(--accent); background: var(--accent); color: white; }

  /* ===== SETUP SCREEN ===== */
  .setup-hero { text-align: center; padding: 24px 0 20px; }
  .setup-hero h2 { font-size: 26px; font-weight: 800; }
  .setup-hero p { font-size: 14px; color: var(--text2); margin-top: 6px; }
  .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg3); transition: background .3s; }
  .step-dot.active { background: var(--accent); }

  /* ===== REST TIMER ===== */
  .rest-banner {
    display: none;
    position: fixed; left: 0; right: 0;
    bottom: calc(58px + var(--safe-bottom));
    background: var(--bg2); border-top: 1px solid var(--accent);
    padding: 12px 16px; z-index: 150;
    box-shadow: 0 -4px 20px rgba(0,0,0,.4);
  }
  .rest-banner.open { display: block; }
  .rest-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .rest-label { font-size: 13px; color: var(--text2); }
  .rest-time { font-size: 24px; font-weight: 800; color: var(--accent2); font-variant-numeric: tabular-nums; }
  .rest-actions { display: flex; gap: 8px; }
  .rest-actions button {
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--bg3);
    background: none; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .rest-bar-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .rest-bar-fill { height: 6px; border-radius: 4px; background: var(--accent); transition: width 1s linear; }
</style>
</head>
<body>
<div id="app">

  <!-- ===== HEADER ===== -->
  <div class="header">
    <h1 id="headerTitle">BenchPress Pro</h1>
    <p id="headerSub">ベンチプレス専用トレーニングアプリ</p>
  </div>

  <!-- ===== SCREENS ===== -->

  <!-- SETUP -->
  <div class="screen active" id="screen-setup">
    <div id="setup-edit-banner" style="display:none;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--yellow)">
      ⚠️ 設定変更モード — 過去の記録は保持されます
    </div>
    <div class="setup-hero">
      <h2 id="setup-title">初期設定</h2>
      <p>あなたに最適なプログラムを自動生成します</p>
    </div>
    <div class="card">
      <div class="card-title">身体情報</div>
      <div class="form-row">
        <div class="form-group">

<script>
// ===== STATE =====
let state = JSON.parse(localStorage.getItem('bp-state') || 'null') || {
  profile: null,
  program: null,
  currentSession: null,
  records: [],    // [{date, sessionType, sets:[{weight,reps,done}], notes, rpe, fatigue, restActual}]
  completedSessions: {},  // sessionKey: true
  bodyweights: []  // [{date, weight, fat}]
};
// 既存データに欄が無い場合の初期化（後方互換）
if (!Array.isArray(state.bodyweights)) state.bodyweights = [];
if (state.profile && state.profile.trainingMax == null) state.profile.trainingMax = state.profile.currentMax;

function save() { localStorage.setItem('bp-state', JSON.stringify(state)); }

// ===== UTILS =====
const DAYS = ['日','月','火','水','木','金','土'];
function fmtDate(d) {
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;
}
function round25(x) { return Math.round(x / 2.5) * 2.5; }
function calcINOL(sets, reps, pct) { return (sets * reps) / (100 - pct); }

// 1セッションの合計INOL
function sessionINOL(session) {
  if (!session || !session.mainSets) return 0;
  return session.mainSets.reduce((a, set) => {
    const pct = Math.round(set.weight / session.rm1 * 100);
    return a + calcINOL(1, set.reps, pct);
  }, 0);
}

// 週ごとの合計INOLを返す { weekIdx: inol }
function weeklyINOLMap() {
  const map = {};
  if (!state.program) return map;
  state.program.sessions.forEach(s => {
    if (s.isMaxDay) return; // MAXテスト日は除外
    map[s.weekIdx] = (map[s.weekIdx] || 0) + sessionINOL(s);
  });
  return map;
}

// Estimate 1RM from reps (Epley formula)
function epley(weight, reps) {
  if (reps === 1) return weight;
  return weight * (1 + reps / 30);
}

// RPEを加味した推定1RM。
// RIR（Reps In Reserve＝あと何回できたか）= 10 - RPE を実施レップに足して
// 「限界まで何回できたか」を推定し、Epley式に代入する。
// これにより「余裕を残したセット」でも本当の実力に近い1RMを推定できる。
function rpeE1RM(weight, reps, rpe) {
  if (!weight || !reps) return 0;
  // RPEが無ければ余裕ゼロ（=通常のEpley）として扱う
  const rir = rpe ? Math.max(0, Math.min(4, 10 - rpe)) : 0;
  const effReps = reps + rir;
  if (effReps === 1) return weight; // 限界の1発挙上＝その重量が1RM（epleyの1レップ特例と同じ）
  return weight * (1 + effReps / 30);
}

// Get weight for given % of 1RM
function pctWeight(rm1, pct) { return round25(rm1 * pct / 100); }

// 過去に実際に挙げた（フルレンジのメインセットで記録済みの）最大重量。
// ラックアップ等パーシャルレンジの重量はここに含めない（可動域が違うため実力の証明にならない）。
// アップの中間ステップがこれを超えないようにする安全上限として使う。
function provenMaxWeight() {
  let max = 0;
  state.records.forEach(r => (r.sets || []).forEach(s => { if (s.weight > max) max = s.weight; }));
  return max;
}

// メインセット前のアップセットプランを生成。
// 20kg(バー)から開始し、メイン重量の%に応じた重量を10kg刻みに丸めて提示する。
// パワーリフター/ベンチプレッサーの一般的な流儀に合わせ、バー以外は全てシングル(1回)にして
// 無駄な疲労を溜めずに神経系・フォームだけ慣らす。重複・バー重量以下の候補は間引くため、
// 軽い日は自然にセット数が減る。
// 最終ステップは90%（PAP＝活動後増強の研究で85〜90%1RMが最も増強効果が高いとされる範囲）とし、
// トップセットの「リハーサル」として機能させる。
// ラックアップ（パーシャルレンジで意図的にメイン超の重量を扱う種目）が含まれる日は、
// topWeight自体がフルレンジの実力を超えることがある。中間のアップ単発重量（＝フルレンジの
// シングル）が provenMaxWeight()（実際に挙げたことのある重量）を超えないようキャップし、
// 未経験の重量をアップとして提案しないようにする。ラックアップ／メインセット自体（＝その日の
// 本番）はキャップ対象外（新記録に挑む対象なので当然超えてよい）。
function buildWarmupSets(topWeight) {
  if (!topWeight || topWeight <= 20) return [];
  const heavy = topWeight > 70;
  const fracs = heavy ? [0.5, 0.7, 0.9] : [0.6, 0.85];
  const proven = provenMaxWeight();
  const cap = proven ? Math.floor(proven / 10) * 10 : Infinity; // 実績が無ければ制限なし
  const sets = [{ weight: 20, reps: 5 }];
  fracs.forEach(f => {
    let w = Math.round(topWeight * f / 10) * 10;
    w = Math.min(w, cap);
    const last = sets[sets.length - 1].weight;
    if (w > last && w < topWeight) sets.push({ weight: w, reps: 1 });
  });
  return sets;
}

// 記録の中で最も重いセット（＝実力を測るトップセット）を返す
function topSetOf(r) {
  if (!r.sets || !r.sets.length) return null;
  let top = r.sets[0];
  r.sets.forEach(s => { if (s.weight > top.weight) top = s; });
  return top;
}

// 記録からRPE補正推定1RMを算出。
// 各セットに個別RPEが無い場合はレコード全体のRPE（旧データ互換）にフォールバックするが、
// 必ず「トップセット（最重量セット）」自身の実績のみで評価する。
// バックオフセットに同じRPEを当てはめて最大値を取ると、レップ数の多さで実力が過大評価されるため。
function recordE1RM(r) {
  const top = topSetOf(r);
  if (!top || !top.weight || !top.reps) return 0;
  const rpe = top.rpe != null ? top.rpe : r.rpe;
  return rpeE1RM(top.weight, top.reps, rpe);
}

// 記録に対応するプログラムセッション（その日・種目の計画）を引く
function sessionForRecord(r) {
  return state.program?.sessions.find(s => s.date === r.date && s.type === r.type) || null;
}

// 日タイプ別のベース信頼度。MAXテスト日・メイン日ほど「実測に近い」。
const CONF_TYPE_BASE = { maxDay: 1.0, main: 0.85, technique: 0.55, volume: 0.35, unknown: 0.6 };
const CONF_HIGH_THRESHOLD = 0.7; // これ以上を「実測級」の参考値として扱う（基準1RM更新自体はMAXテスト日限定）

// 記録の推定1RMがどれだけ信頼できるか（0〜1）を返す。
// プログラムは日ごとに意図的に強度を使い分けている（ボリューム日は高レップ低強度、
// メイン日は低レップ高強度など）が、recordE1RM自体はその違いを見ずに逆算するため、
// コンディション判定やプログラム再調整で全記録を同列に扱うとボリューム/テクニック日の
// ブレに引きずられてしまう。低レップ・高RPE・メイン/MAXテスト日ほど高信頼、
// 高レップ・ボリューム日ほど低信頼（参考値）とする。
// sessが見つからない場合（古いプログラムを再生成した後の過去データ等）でも
// reps/rpeだけから妥当な中間値を返す（既存state.recordsへの遡及変更は不要）。
function e1rmConfidence(rec, sess) {
  if (sess === undefined) sess = sessionForRecord(rec);
  const top = topSetOf(rec);
  if (!top || !top.reps) return 0;
  const rpe = top.rpe != null ? top.rpe : rec.rpe;

  const typeBase = sess?.isMaxDay ? CONF_TYPE_BASE.maxDay
    : sess?.type === 'main' ? CONF_TYPE_BASE.main
    : sess?.type === 'technique' ? CONF_TYPE_BASE.technique
    : sess?.type === 'volume' ? CONF_TYPE_BASE.volume
    : CONF_TYPE_BASE.unknown;

  const repFactor = top.reps <= 1 ? 1 : top.reps <= 2 ? 0.95 : top.reps <= 4 ? 0.8 : top.reps <= 6 ? 0.65 : 0.5;
  const rpeFactor = rpe == null ? 0.6 : rpe >= 9.5 ? 1 : rpe >= 8.5 ? 0.95 : rpe >= 7.5 ? 0.8 : rpe >= 6.5 ? 0.65 : 0.55;

  return Math.max(0.1, Math.min(1, typeBase * repFactor * rpeFactor));
}

// UI表示用の信頼度ラベル。「実測」を名乗るのはMAXテスト日のみ
// （メイン日の高強度シングルも計画通りの練習であって真の限界テストではないため、
// 紛らわしい「実測級」表記にしない）。それ以外は信頼度に応じた参考値の強弱で表示する。
function confidenceLabel(c, isMaxDay) {
  if (isMaxDay) return { label: '実測(MAXテスト)', badge: '🎯', color: 'var(--green)' };
  if (c >= CONF_HIGH_THRESHOLD) return { label: '参考(高)', badge: '📐', color: 'var(--accent2)' };
  if (c >= 0.45) return { label: '参考(中)', badge: '📊', color: 'var(--accent2)' };
  return { label: '参考(低)', badge: '📉', color: 'var(--text2)' };
}

// 信頼度/MAXテスト日に応じた散布点の色・サイズ（RM推移・相対筋力チャートで共通利用）
function confPointColor(isMaxDay, conf) {
  return isMaxDay || conf >= CONF_HIGH_THRESHOLD ? '#3b82f6' : conf >= 0.45 ? '#93c5fd' : '#cbd5e1';
}
function confPointRadius(isMaxDay, conf) {
  return isMaxDay ? 6 : conf >= CONF_HIGH_THRESHOLD ? 5 : conf >= 0.45 ? 4 : 3;
}

// 同種目の1つ前の記録を返す（beforeDateより前の最新）
function lastRecordOfType(type, beforeDate) {
  const past = state.records
    .filter(r => r.type === type && r.date < beforeDate)
    .sort((a, b) => a.date.localeCompare(b.date));
  return past.length ? past[past.length - 1] : null;
}

// ===== 休憩タイマー =====
let restTimer = null;
let restRemaining = 0;
let restTotal = 0;

function startRest(sec) {
  stopRest();
  restTotal = sec;
  restRemaining = sec;
  document.getElementById('restBanner').classList.add('open');
  updateRestUI();
  restTimer = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) { stopRest(); return; }
    updateRestUI();
  }, 1000);
}

function addRest(sec) {
  if (restTimer === null) return;
  restRemaining += sec;
  restTotal += sec;
  updateRestUI();
}

function stopRest() {
  if (restTimer !== null) { clearInterval(restTimer); restTimer = null; }
  document.getElementById('restBanner').classList.remove('open');
}

function updateRestUI() {
  const m = Math.floor(restRemaining / 60);
  const s = restRemaining % 60;
  document.getElementById('restTime').textContent = `${m}:${String(s).padStart(2,'0')}`;
  const pct = restTotal ? Math.max(0, restRemaining / restTotal * 100) : 0;
  document.getElementById('restBar').style.width = pct + '%';
}

// ===== データのバックアップ／復元 =====
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `benchpress-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importData(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      // 最低限の妥当性チェック
      if (typeof data !== 'object' || data === null || !('records' in data)) {
        alert('このファイルはBenchPress Proのバックアップではないようです。');
        return;
      }
      if (!confirm('現在のデータを上書きしてこのバックアップを復元しますか？\nこの操作は元に戻せません。')) return;
      state = data;
      save();
      alert('データを復元しました。アプリを再読み込みします。');
      location.reload();
    } catch (e) {
      alert('ファイルの読み込みに失敗しました。JSONが壊れている可能性があります。');
    } finally {
      event.target.value = ''; // 同じファイルを再選択できるようリセット
    }
  };
  reader.readAsText(file);
}

// ===== 週数自動算出（実力レベル・年齢に応じたエビデンスベースのペース）=====
// 1RM増加ペース：1〜2週ごとに1.25〜2.5kgステップアップ
const GAIN_STEP_MIN = 1.25;   // 最小ステップ
const GAIN_STEP_MAX = 2.5;    // 最大ステップ

// エビデンスに基づく週あたり1RM伸びの目安。
// 中級者(体重比1.0〜1.35)は月2.5〜5kg＝週0.6〜1.25kgが上限（初心者はより速い線形進行が可能）。
// 45歳以上は回復力低下を考慮して2割引き（マスターズの周期化ガイドライン）。
function planRatePerWeek(profile) {
  // 実力レベルの判定はtrainingMax(MAXテストで検証済みの現在値)優先。
  // currentMax固定のままだと、MAXテストで伸びてもレベル判定が古いまま据え置かれてしまう。
  const nowMax = profile ? (profile.trainingMax ?? profile.currentMax) : null;
  const ratio = profile && profile.weight ? nowMax / profile.weight : 1.2;
  let rate;
  if (ratio < 1.0) rate = 1.875;        // 初心者相当
  else if (ratio < 1.35) rate = 1.0;    // 中級者
  else rate = 0.6;                       // 上級者
  if (profile && profile.age >= 45) rate *= 0.8;
  return rate;
}

// 重量を1.25kg刻みに丸める
function round125(x) { return Math.round(x / 1.25) * 1.25; }

// 現状と目標から週数を算出。ディロード週は進行しないため、
// 1ステップが1.25〜2.5kgに収まり、かつ実力・年齢相応のペースに近い週数を選ぶ。
// 16週(1メゾサイクルの上限)に収まらない目標は13週ブロックに分割し、
// エビデンスペースで到達可能な中間マイルストーンを第1ブロックの目標として返す。
// 戻り値: { weeks, milestone } — milestoneがnull以外なら分割ロードマップ。
function recommendWeeks(currentMax, targetMax, profile) {
  const diff = targetMax - currentMax;
  if (diff <= 0) return null; // 目標が現状以下
  const rate = planRatePerWeek(profile);
  let best = null, bestScore = Infinity;
  for (let total = 3; total <= 24; total++) {
    let prog = 0;
    for (let w = 0; w < total; w++) if (programPhase(total, w).name !== 'deload') prog++;
    const steps = Math.max(1, prog - 1);   // 最初の進行週=現状、以降がステップ
    const avgStep = diff / steps;
    if (avgStep > GAIN_STEP_MAX) continue;  // 1ステップが2.5kg超→週数不足
    const score = Math.abs(avgStep - rate) + total * 0.01; // 実力相応ペースに近く短いものを優先
    if (score < bestScore) { bestScore = score; best = total; }
  }
  if (best !== null && best <= 16) return { weeks: best, milestone: null };
  // 1ブロックで届かない → 13週ブロック + 中間マイルストーン
  let milestone = round25(currentMax + rate * 13);
  milestone = Math.max(round25(currentMax) + 2.5, Math.min(milestone, round25(targetMax)));
  if (milestone >= targetMax) return { weeks: best === null ? 24 : best, milestone: null };
  return { weeks: 13, milestone };
}

// 週ごとの推定1RMを返す関数を生成。
// 進行週（非ディロード）で1.25〜2.5kg刻みにステップアップ、
// ディロード週は重量を据え置いて疲労を抜く。最終週で目標を実現する。
function makeRmForWeek(currentMax, targetMax, totalWeeks) {
  const arr = new Array(totalWeeks);
  const progWeeks = [];
  for (let w = 0; w < totalWeeks; w++) {
    if (programPhase(totalWeeks, w).name !== 'deload') progWeeks.push(w);
  }
  const nProg = Math.max(1, progWeeks.length);
  let p = 0, lastRM = currentMax;
  for (let w = 0; w < totalWeeks; w++) {
    if (programPhase(totalWeeks, w).name === 'deload') {
      arr[w] = lastRM;            // ディロード週は据え置き
    } else {
      const t = nProg > 1 ? p / (nProg - 1) : 1;
      arr[w] = round125(currentMax + (targetMax - currentMax) * t);
      lastRM = arr[w];
      p++;
    }
  }
  arr[totalWeeks - 1] = targetMax; // 最終週（ピーク/MAXテスト）で目標を実現
  return (w) => arr[Math.min(Math.max(w, 0), arr.length - 1)];
}

// 入力変更時に推奨週数をライブ表示
function updateWeeksProposal() {
  const cur = +document.getElementById('s-current-max').value;
  const tgt = +document.getElementById('s-target-max').value;
  const box = document.getElementById('weeks-proposal');
  const txt = document.getElementById('weeks-proposal-text');
  const sub = document.getElementById('weeks-proposal-sub');
  if (!cur || !tgt) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  if (tgt <= cur) {
    txt.textContent = '⚠️ 目標を現状より高く設定してください';
    sub.textContent = '';
    return;
  }
  const weight = +document.getElementById('s-weight').value || 0;
  const age = +document.getElementById('s-age').value || 0;
  const rec = recommendWeeks(cur, tgt, { currentMax: cur, weight, age });
  const months = (rec.weeks / 4.345).toFixed(1);
  if (rec.milestone) {
    // 1ブロックで届かない目標 → 分割ロードマップを提示
    txt.textContent = `${rec.weeks}週間ブロック × 複数回（第1ブロック目標 ${rec.milestone}kg）`;
    sub.textContent = `${cur}kg → ${tgt}kg（+${tgt - cur}kg）は、あなたの実力レベルではエビデンス上1ブロックで到達困難です。まず${rec.weeks}週で${rec.milestone}kgを目指し、MAXテスト後に実績で次ブロックを再生成する多段計画を推奨します。`;
  } else {
    const diff = tgt - cur;
    const perWeek = (diff / rec.weeks).toFixed(2);
    txt.textContent = `${rec.weeks}週間プログラム（約${months}ヶ月）`;
    sub.textContent = `${cur}kg → ${tgt}kg（+${diff}kg）を週平均+${perWeek}kg増で達成する計画です。`;
  }
}

// ===== PROGRAM GENERATOR =====
function generateProgram() {
  const age = +document.getElementById('s-age').value;
  const weight = +document.getElementById('s-weight').value;
  const height = +document.getElementById('s-height').value;
  const gender = document.getElementById('s-gender').value;
  const currentMax = +document.getElementById('s-current-max').value;
  const targetMax = +document.getElementById('s-target-max').value;
  const startDate = document.getElementById('s-start-date').value;

  if (!age || !weight || !height || !currentMax || !targetMax || !startDate) {
    alert('すべての項目を入力してください'); return;
  }
  if (targetMax <= currentMax) {
    alert('目標1RMは現在の1RMより高く設定してください'); return;
  }

  // 週数は現状と目標から自動算出（実力レベル・年齢に応じたエビデンスペース）
  const rec = recommendWeeks(currentMax, targetMax, { currentMax, weight, age });
  const totalWeeks = rec.weeks;
  const blockTarget = rec.milestone; // nullなら1ブロックで目標到達、非nullなら分割ロードマップの第1ブロック目標

  // 基準1RM(trainingMax)はMAXテスト日の記録でのみ更新される値。編集モードでは保持し、
  // 新規セットアップ時のみcurrentMax(自己申告実測値)で初期化する。
  const prevTrainingMax = (isEditMode && state.profile) ? state.profile.trainingMax : null;
  const profile = { age, weight, height, gender, currentMax, targetMax, blockTarget, startDate, totalWeeks,
    trainingMax: prevTrainingMax != null ? prevTrainingMax : currentMax };
  state.profile = profile;

  // 編集モードでは記録・完了状態を保持
  if (!isEditMode) {
    state.records = [];
    state.completedSessions = {};
  }
  isEditMode = false;
  document.getElementById('setup-title').textContent = '初期設定';
  document.getElementById('setup-btn').textContent = 'プログラムを自動生成';
  document.getElementById('setup-edit-banner').style.display = 'none';
  document.getElementById('setup-cancel-btn').style.display = 'none';

  // 週ごとの推定1RM（1.25〜2.5kg刻みの段階的進行、ディロード週は据え置き）
  // 分割ロードマップの場合は第1ブロック目標(blockTarget)に向けて生成する
  const rmForWeek = makeRmForWeek(currentMax, blockTarget || targetMax, totalWeeks);

  const program = buildProgramSessions(profile, rmForWeek);

  state.program = { profile, sessions: program, generated: new Date().toISOString() };
  save();

  // 実現可能性チェック & 最適化
  validateAndOptimize();

  switchTab('program');
  renderProgram();
}

// ===== 共有：セッション一覧の生成 =====
// rmForWeek(weekIdx) は各週の推定1RMを返す関数
function programPhase(totalWeeks, weekIdx) {
  const last = totalWeeks - 1;
  // 最終週は必ずテーパー（疲労抜き＋MAXテストでピーク実現）
  if (weekIdx === last) return { name: 'deload' };
  // 終盤2週はピーキング（最終週直前にピークを作る）
  if (totalWeeks >= 6 && weekIdx >= last - 1) return { name: 'peaking' };
  // 疲労管理：4週ごとにディロードを挿入（中盤、終盤テーパーと重複しない範囲）
  if (totalWeeks >= 8 && (weekIdx + 1) % 4 === 0 && weekIdx < last - 2) return { name: 'deload' };
  // 残りを比率配分：蓄積〜55% → 強化 → ピーキング
  const frac = weekIdx / totalWeeks;
  if (frac < 0.55) return { name: 'accumulation' };
  if (frac < 0.80) return { name: 'intensification' };
  return { name: 'peaking' };
}

// MAXテスト日（試合シミュレーション）を行う週か判定
function isMaxWeek(totalWeeks, weekIdx) {
  if (weekIdx === totalWeeks - 1) return true;            // 最終週は必ず実施（目標達成の本番）
  if (totalWeeks >= 14 && weekIdx === Math.floor(totalWeeks / 2)) return true; // 長期は中間で進捗確認
  return false;
}

function buildProgramSessions(profile, rmForWeek) {
  const { startDate, totalWeeks } = profile;
  const program = [];
  const startDateObj = new Date(startDate);
  startDateObj.setHours(0,0,0,0);
  const sd = new Date(startDate);
  // 今週の月曜日を起点にする（スタート日が含まれる週）
  const dayOfWeek = sd.getDay(); // 0=Sun,1=Mon...6=Sat
  sd.setDate(sd.getDate() + (dayOfWeek === 0 ? 1 : 1 - dayOfWeek));

  for (let w = 0; w < totalWeeks; w++) {
    const phase = programPhase(totalWeeks, w);
    const weekRM = rmForWeek(w);
    const isMaxDay = isMaxWeek(totalWeeks, w);
    const isDeload = phase.name === 'deload';

    const monDate = new Date(sd); monDate.setDate(sd.getDate() + w * 7);
    const wedDate = new Date(monDate); wedDate.setDate(monDate.getDate() + 2);
    const satDate = new Date(monDate); satDate.setDate(monDate.getDate() + 5);

    const vol = buildSession(monDate, 'volume', weekRM, phase, w, isDeload);
    const tech = buildSession(wedDate, 'technique', weekRM, phase, w, isDeload);
    const main = buildSession(satDate, 'main', weekRM, phase, w, isDeload, isMaxDay);

    // 週あたりINOLを目標2.0〜2.8に調整（蓄積・強化期のみ。ピーキング/テーパーは意図的に低負荷）
    // MAXテスト日は3本勝負の固定構成のため対象外（自動調整で試技が重複挿入されるバグを回避）
    if ((phase.name === 'accumulation' || phase.name === 'intensification') && !isMaxDay) {
      balanceWeeklyINOL([vol, tech, main]);
    }

    if (monDate >= startDateObj) program.push(vol);
    if (wedDate >= startDateObj) program.push(tech);
    if (satDate >= startDateObj) program.push(main);
  }
  return program;
}

// 週あたりの合計INOLが2.0〜2.8に収まるよう、ボリューム/メイン日のセット数を増減
function balanceWeeklyINOL(sessions) {
  const TARGET_MIN = 2.0, TARGET_MAX = 2.8;
  const sum = () => sessions.reduce((a, s) => a + sessionINOL(s), 0);
  // メインセットの末尾(通常のワークセット)を複製/削除して微調整
  const volume = sessions.find(s => s.type === 'volume');
  const main = sessions.find(s => s.type === 'main');

  let guard = 0;
  // 不足→ボリューム日にワークセットを追加（最大8セットまで）
  while (sum() < TARGET_MIN && guard++ < 20) {
    if (volume && volume.mainSets.length < 8) {
      const base = volume.mainSets[0];
      volume.mainSets.push({ weight: base.weight, reps: base.reps, note: base.note });
    } else if (main && main.mainSets.length < 7) {
      const base = main.mainSets[0];
      main.mainSets.splice(main.mainSets.length - 1, 0, { weight: base.weight, reps: base.reps, note: base.note });
    } else break;
  }
  guard = 0;
  // 過多→ボリューム日のワークセットを削減（最低3セットは維持）
  while (sum() > TARGET_MAX && guard++ < 20) {
    if (volume && volume.mainSets.length > 3) {
      volume.mainSets.pop();
    } else if (main && main.mainSets.length > 3) {
      main.mainSets.splice(main.mainSets.length - 2, 1);
    } else break;
  }
}

// ===== 実現可能性チェック & プログラム全体評価 =====
// 完成したプログラム全体を見て、長すぎ・短すぎを判定する。
function validateAndOptimize() {
  const p = state.profile;
  // 「現在の実力」はtrainingMax優先（MAXテストで更新される検証済みの値）。
  // currentMaxはセットアップ時の固定値のままなので、これだけを見ているとMAXテストで
  // 実力が伸びても診断レポートが古い数値のまま表示され続けてしまう。
  const nowMax = p.trainingMax ?? p.currentMax;
  const blockTgt = p.blockTarget || p.targetMax; // このブロックで実際に目指す重量
  const diff = blockTgt - nowMax;
  const neededPerWeek = diff / p.totalWeeks;
  const months = (p.totalWeeks / 4.345).toFixed(1);
  const rate = planRatePerWeek(p); // 実力レベル・年齢に応じたエビデンス上の週あたり伸び

  const report = { status: 'ok', warnings: [], infos: [], regenerated: false };

  // 目標が現在より低い
  if (p.targetMax - nowMax <= 0) {
    report.status = 'warn';
    report.warnings.push('目標1RMが現在の1RM以下です。目標を引き上げてください。');
    state.program.report = report;
    save();
    return report;
  }

  if (p.blockTarget) {
    report.infos.push(`最終目標${p.targetMax}kgは実力レベル(体重比${(nowMax / p.weight).toFixed(2)}倍)${p.age >= 45 ? 'と年齢' : ''}を踏まえると1ブロックでは到達困難なため、多段計画にしています。第1ブロック: ${nowMax}kg → ${blockTgt}kg（${p.totalWeeks}週間）。MAXテスト後、実績をもとに次ブロックを再生成してください。`);
  } else {
    report.infos.push(`現状${nowMax}kg → 目標${p.targetMax}kg（+${diff}kg）を${p.totalWeeks}週間（約${months}ヶ月）で達成する計画です。`);
  }

  // プログラム全体の長さ評価：エビデンス上の伸びペース(実力・年齢考慮)と比較
  if (neededPerWeek > rate * 1.3) {
    report.status = 'warn';
    report.warnings.push(`週平均+${neededPerWeek.toFixed(1)}kgの進行は、あなたの実力レベルと年齢での科学的な伸びの目安（週+${rate.toFixed(1)}kg）を大きく超えています。目標の分割か期間延長を強く推奨します。伸び悩んだ場合は記録入力で自動調整されます。`);
  } else if (neededPerWeek < rate * 0.4) {
    report.status = 'caution';
    report.warnings.push(`週平均+${neededPerWeek.toFixed(1)}kgはゆとりがあり、期間がやや長めです。より短期で達成できる可能性があります。`);
  } else {
    report.infos.push(`週平均+${neededPerWeek.toFixed(1)}kg増は、あなたの実力レベル${p.age >= 45 ? '・年齢' : ''}に対して科学的に現実的なペース（目安 週+${rate.toFixed(1)}kg）です。`);
  }

  // 週あたりINOLチェック（蓄積・強化期の目標 2.0〜2.8）
  if (state.program) {
    const wmap = weeklyINOLMap();
    // 週ごとのセッション数（完全な週=3セッションのみ評価対象）
    const cnt = {};
    state.program.sessions.forEach(s => { cnt[s.weekIdx] = (cnt[s.weekIdx] || 0) + 1; });
    const buildWeeks = [];
    state.program.sessions.forEach(s => {
      if ((s.phaseName === 'accumulation' || s.phaseName === 'intensification')
          && cnt[s.weekIdx] === 3 && !buildWeeks.includes(s.weekIdx)) {
        buildWeeks.push(s.weekIdx);
      }
    });
    const vals = buildWeeks.map(w => wmap[w]).filter(v => v != null);
    if (vals.length) {
      const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
      const out = vals.filter(v => v < 2.0 || v > 2.8).length;
      report.infos.push(`週あたりINOLは平均${avg.toFixed(1)}（目標2.0〜2.8）${out === 0 ? '。最適な負荷量です。' : '。'}`);
    }
  }

  state.program.report = report;
  save();
  return report;
}

function buildSession(date, type, rm1, phase, weekIdx, isDeload, isMaxDay = false) {
  const dateStr = date.toISOString().split('T')[0];
  let mainSets = [];
  let rackup = null;
  let phaseName = phase.name;


  if (isMaxDay) {
    // MAXテスト日（試合シミュレーション）— 競技の試技係数に基づく3本勝負
    // 第1試技0.90 / 第2試技0.97 / 第3試技1.025（ベンチプレスの標準係数）
    // アップは各自で実施。記録は試技のみ。すべてポーズ＋コマンドで競技と同条件に
    mainSets = [
      { weight: pctWeight(rm1, 90), reps: 1, note: '🎙️ 第1試技（確実に・自信構築）', commands: true },
      { weight: pctWeight(rm1, 97), reps: 1, note: '🎙️ 第2試技（バー速度で判断）', commands: true },
      { weight: pctWeight(rm1, 102.5), reps: 1, note: '🎙️🎯 第3試技 NEW MAX', isTarget: true, commands: true },
    ];
    rackup = null;
    return { date: dateStr, type, phaseName: 'MAX_TEST', weekIdx, mainSets, rackup, isMaxDay: true, rm1: round25(rm1) };
  }

  if (type === 'volume') {
    // 高重量・低レップ志向（神経系強化）。量はINOL自動調整でセット数を確保
    let pct, sets, reps;
    if (phaseName === 'accumulation') { pct = 80; sets = 5; reps = 3; }
    else if (phaseName === 'intensification') { pct = 85; sets = 5; reps = 2; }
    else if (phaseName === 'peaking') { pct = 82; sets = 3; reps = 2; }
    // ディロードは45歳以上でより深く落とす（マスターズは回復微週の強度減を10〜15%と大きめに取る）
    else { /* deload=テーパー週 */ pct = (state.profile?.age >= 45) ? 65 : 70; sets = 2; reps = 3; }

    for (let i = 0; i < sets; i++) {
      mainSets.push({ weight: pctWeight(rm1, pct), reps, note: phaseName === 'deload' ? '軽め・疲労抜き' : '' });
    }
  }

  if (type === 'technique') {
    // ポーズ＋低レップで爆発的な立ち上がり（レートオブフォースデベロップメント）を強化
    let pct, sets, reps, note;
    if (phaseName === 'accumulation') { pct = 70; sets = 4; reps = 3; note = '1秒ポーズ・爆発的に挙上'; }
    else if (phaseName === 'intensification') { pct = 75; sets = 4; reps = 2; note = '1秒ポーズ・爆発的に挙上'; }
    else if (phaseName === 'peaking') { pct = 87; sets = 3; reps = 1; note = '🎙️ ポーズ＋コマンド練習'; }
    else { /* deload=テーパー週 */ pct = 88; sets = 2; reps = 1; note = '🎙️ オープナー練習（コマンド）'; }

    for (let i = 0; i < sets; i++) {
      mainSets.push({ weight: pctWeight(rm1, pct), reps, note, commands: phaseName === 'peaking' || phaseName === 'deload' });
    }
  }

  if (type === 'main') {
    // メインは高強度シングル/ダブル中心で最大筋力・神経系を強化
    let pct, sets, reps;
    if (phaseName === 'accumulation') { pct = 86; sets = 4; reps = 2; }
    else if (phaseName === 'intensification') { pct = 90; sets = 5; reps = 1; }
    else { pct = 72; sets = 3; reps = 2; }

    // ラックアップ（重量慣れ）— テーパー週は神経系を疲労させないため省略
    if (phaseName !== 'deload') {
      const rackupWeight = pctWeight(rm1, phaseName === 'peaking' ? 100 : 107);
      rackup = { weight: rackupWeight, hold: phaseName === 'peaking' ? '2秒保持' : '3秒保持', sets: phaseName === 'peaking' ? 2 : 3,
        note: phaseName === 'peaking' ? '試技前の神経系活性化（PAP）' : '重量慣れ・神経系活性化' };
    }

    if (phaseName === 'peaking') {
      // 実現（realization）ブロック：高強度シングルへ漸増。試技に近い重量に習熟
      mainSets.push({ weight: pctWeight(rm1, 90), reps: 1, note: '🎙️ ポーズ＋コマンド' , commands: true });
      mainSets.push({ weight: pctWeight(rm1, 93), reps: 1, note: '🎙️ ポーズ＋コマンド（オープナー想定）', commands: true });
      mainSets.push({ weight: pctWeight(rm1, 96), reps: 1, note: '🎙️ ポーズ＋コマンド（伸びれば挑戦）', commands: true });
      // テーパー理論：量を抑えるため軽いバックオフ1本のみ
      mainSets.push({ weight: pctWeight(rm1, 82), reps: 2, note: 'バックオフ（量確保）' });
    } else if (phaseName === 'deload') {
      // テーパー週＝試合直前：オープナー確認のみ。疲労を残さない
      mainSets.push({ weight: pctWeight(rm1, 85), reps: 1, note: '🎙️ コマンド練習', commands: true });
      mainSets.push({ weight: pctWeight(rm1, 90), reps: 1, note: '🎙️ オープナー確認（これで終了）', commands: true });
    } else {
      for (let i = 0; i < sets; i++) {
        mainSets.push({ weight: pctWeight(rm1, pct), reps, note: '' });
      }
      // バックオフは1本のみ・低レップ（神経系優先で疲労を抑える）
      mainSets.push({ weight: pctWeight(rm1, pct - 8), reps: reps + 1, note: 'バックオフセット' });
    }
  }

  return { date: dateStr, type, phaseName, weekIdx, mainSets, rackup, isMaxDay: false, rm1: round25(rm1) };
}

      </div>`;
    return;
  }

  const p = state.profile;
  const sessions = state.program.sessions;
  const totalWeeks = p.totalWeeks;

  // 診断レポートカード
  const rep = state.program.report;
  if (rep) {

    rep.warnings.forEach(w => { repHtml += `<div style="font-size:13px;color:var(--yellow);margin-bottom:6px;line-height:1.5">⚠️ ${w}</div>`; });
    rep.infos.forEach(i => { repHtml += `<div style="font-size:13px;color:var(--text2);margin-bottom:4px;line-height:1.5">ℹ️ ${i}</div>`; });
    if (rep.status === 'ok' && rep.warnings.length === 0) {
      repHtml += `<div style="font-size:13px;color:var(--green)">このプログラムは科学的に現実的なペースで構成されています。</div>`;
    }
    repHtml += '</div>';
    document.getElementById('program-content').innerHTML = repHtml;
  } else {
    document.getElementById('program-content').innerHTML = '';
  }

  // Group by week
  let html = `
    <div class="card">
      <div class="progress-ring">
        <div class="ring-wrap">
          <svg class="ring-svg" width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="#334155" stroke-width="6"/>
            <circle id="ringCircle" cx="32" cy="32" r="26" fill="none" stroke="#3b82f6" stroke-width="6"
              stroke-dasharray="163.4" stroke-dashoffset="163.4" stroke-linecap="round"/>
          </svg>
          <div class="ring-pct" id="ringPct">0%</div>
        </div>
        <div style="flex:1">
          <div style="font-size:18px;font-weight:800">${p.trainingMax ?? p.currentMax}kg → ${p.targetMax}kg</div>
          <div style="font-size:13px;color:var(--text2)">${p.totalWeeks}週間プログラム</div>
          <div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span class="badge badge-blue">段階的+1.25〜2.5kg</span>
            <button class="btn btn-outline btn-sm" onclick="openSettings()" style="font-size:11px;padding:4px 10px">設定変更</button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="exportData()" style="flex:1;font-size:12px;padding:8px">📥 バックアップ</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('restoreInput').click()" style="flex:1;font-size:12px;padding:8px">📤 復元</button>
      </div>
    </div>`;

  // Count sessions by week
  const weeks = {};
  sessions.forEach(s => {
    const w = s.weekIdx;
    if (!weeks[w]) weeks[w] = [];
    weeks[w].push(s);
  });

  const phaseLabels = { accumulation:'蓄積', intensification:'強化', peaking:'ピーキング', deload:'ディロード', MAX_TEST:'MAXテスト' };
  const typeLabels = { volume:'ボリューム', technique:'テクニック', main:'メインセッション' };
  const typeBadges = { volume:'badge-blue', technique:'badge-yellow', main:'badge-green' };

  for (let w = 0; w < totalWeeks; w++) {
    const wSessions = weeks[w] || [];
    const phName = wSessions[0]?.phaseName || '';
    const doneCount = wSessions.filter(s => state.completedSessions[s.date + s.type]).length;
    const isCurrentWeek = isThisWeek(wSessions);

    html += `<div class="week-card" ${isCurrentWeek ? 'id="current-week"' : ''}>

        <h3>Week ${w + 1} ${isCurrentWeek ? '◀ 今週' : ''}</h3>

          <span class="badge ${phName === 'deload' ? 'badge-red' : phName === 'peaking' ? 'badge-yellow' : 'badge-blue'}">${phaseLabels[phName] || ''}</span>
          <span style="font-size:12px;color:var(--text2)">${doneCount}/${wSessions.length}</span>
        </div>
      </div>`;

    wSessions.forEach(s => {
      const done = state.completedSessions[s.date + s.type];
      const rm = state.program.sessions.find(x => x.date === s.date && x.type === s.type)?.rm1 || '-';
      const mainPct = s.mainSets[0] ? Math.round(s.mainSets[0].weight / rm * 100) : 0;
      const sessionInol = s.mainSets.reduce((acc, set) => acc + calcINOL(1, set.reps, Math.round(set.weight / rm * 100)), 0).toFixed(2);

      html += `<div class="session-row" onclick="openSession('${s.date}','${s.type}')">
        <div class="session-top">
          <div>
            <div class="session-date">${fmtDate(s.date)}</div>
            <div class="session-type">${typeLabels[s.type] || s.type}</div>
          </div>
          <div style="text-align:right">
            ${s.isMaxDay ? '<span class="max-day-badge">🏆 MAXテスト</span>' : `<span class="badge ${typeBadges[s.type]}">${mainPct}% × ${s.mainSets.length}set</span>`}
            ${done ? '<div style="color:var(--green);font-size:12px;margin-top:4px">✓ 完了</div>' : ''}
          </div>
        </div>
        <div class="sets-preview">INOL ${sessionInol} | 計画1RM ${rm}kg | ${s.mainSets.length}セット</div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('program-content').innerHTML += html;

  // Update ring
  const total = sessions.length;
  const done = Object.keys(state.completedSessions).length;
  const pctDone = total ? done / total : 0;
  const circumference = 2 * Math.PI * 26;
  const offset = circumference * (1 - pctDone);
  setTimeout(() => {
    const circle = document.getElementById('ringCircle');
    const pctEl = document.getElementById('ringPct');
    if (circle) { circle.style.strokeDashoffset = offset; }
    if (pctEl) pctEl.textContent = Math.round(pctDone * 100) + '%';
  }, 100);

  // Scroll to current week
  setTimeout(() => {
    const el = document.getElementById('current-week');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 200);
}

function isThisWeek(sessions) {
  const today = new Date();
  today.setHours(0,0,0,0);
  return sessions.some(s => {
    const d = new Date(s.date);
    const diff = Math.abs(d - today);
    return diff < 7 * 24 * 60 * 60 * 1000;
  });
}

// ===== OPEN SESSION =====
function openSession(date, type) {
  const session = state.program.sessions.find(s => s.date === date && s.type === type);
  if (!session) return;

  state.currentSession = session;
  save();
  switchTab('training');
  renderTraining(session);
}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="card-title" style="margin:0">INOL (疲労管理指標)</div>
        <div style="font-size:22px;font-weight:800;color:${inolColor}">${totalINOL.toFixed(2)}</div>
      </div>
      <div class="inol-bar-bg"><div class="inol-bar-fill" style="width:${inolPct}%;background:${inolColor}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px">
        <span>維持 0.8</span><span style="color:var(--green)">最適 2.0</span><span>限界 3.0</span>
      </div>
    </div>`;
  }

  // 休憩実測（記録済みセッションのみ）
  if (logged && logged.restActual && logged.restActual.length) {
    const heavy = session.isMaxDay || session.phaseName === 'peaking' || session.type === 'main';
    const recommended = heavy ? 180 : 120;
    const avgRest = Math.round(logged.restActual.reduce((a,b)=>a+b,0) / logged.restActual.length);
    const short = avgRest < recommended * 0.8;
    const col = short ? 'var(--yellow)' : 'var(--green)';
    html += `<div class="card" style="padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px">⏱️ 平均実測休憩（推奨 ${recommended}秒）</span>
        <span style="font-weight:800;color:${col}">${avgRest}秒</span>
      </div>
      ${short ? `<div style="font-size:12px;color:var(--yellow);margin-top:4px">休憩がやや短めです。疲労が抜けきる前に次セットに入っている可能性があります。</div>` : ''}
    </div>`;
  }

  // アップセット
  const topWeight = Math.max(session.rackup?.weight || 0, ...session.mainSets.map(s => s.weight));
  const warmups = buildWarmupSets(topWeight);
  if (warmups.length) {
    html += `<div class="phase-label">アップセット</div>`;
    warmups.forEach((w, i) => {
      html += `<div class="set-row" style="opacity:.75">
        <div class="set-num">W${i+1}</div>
        <div class="set-info">
          <div class="set-weight">${w.weight}kg</div>
          <div class="set-reps">${w.reps}rep</div>
        </div>
      </div>`;
    });
  }

  // Rack-up
  if (session.rackup) {
    html += `<div class="phase-label">ラックアップ（重量慣れ）</div>
    <div class="set-row" style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3)">
      <div class="set-num" style="color:var(--accent2)">R</div>
      <div class="set-info">
        <div class="set-weight" style="color:var(--accent2)">${session.rackup.weight}kg × ${session.rackup.sets}回</div>
        <div class="set-reps">${session.rackup.hold} — ${session.rackup.note}</div>
      </div>
    </div>`;
  }

  // Main sets
  html += `<div class="phase-label">${session.isMaxDay ? '試技（アテンプト）' : 'メインセット'}</div>`;
  // コマンド練習がある場合の案内
  if (session.mainSets.some(s => s.commands)) {
    html += `<div class="card" style="background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.3);padding:12px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:4px">🎙️ 競技コマンド練習</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6">胸でしっかり静止 →「スタート」→ プレス →「ラック」の手順を再現。本番条件に習熟し、ピーキングの効果を最大化します。</div>
    </div>`;
  }
  // 前回の同種目セッション（比較表示用）
  const prevRecord = lastRecordOfType(session.type, session.date);
  session.mainSets.forEach((set, i) => {
    const pct = Math.round(set.weight / session.rm1 * 100);
    const loggedSet = logged?.sets?.[i];
    const prevSet = prevRecord?.sets?.[i];
    html += `<div class="set-row" id="mainset-${i}" ${set.isTarget ? 'style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)"' : ''}>
      <div class="set-num" style="${set.isTarget ? 'color:var(--yellow)' : ''}">${i+1}</div>
      <div class="set-info">
        <div class="set-weight" style="${set.isTarget ? 'color:var(--yellow)' : ''}">${set.weight}kg</div>
        <div class="set-reps">${set.reps}rep · ${pct}% ${set.note ? '— ' + set.note : ''}</div>
        ${prevSet ? `<div style="font-size:12px;color:var(--text2);margin-top:2px">前回: ${prevSet.weight}kg × ${prevSet.reps}rep</div>` : ''}
        ${loggedSet ? `<div style="font-size:12px;color:var(--green);margin-top:2px">記録: ${loggedSet.weight}kg × ${loggedSet.reps}rep</div>` : ''}
      </div>
      <button class="set-done ${loggedSet ? 'checked' : ''}" onclick="toggleSet(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>`;
  });

  // Log & Complete buttons
  html += `<div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="btn btn-outline" onclick="openLogModal()">記録を入力</button>
    <button class="btn btn-success" onclick="completeSession()" ${done ? 'disabled style="opacity:.5"' : ''}>${done ? '✓ 完了済み' : 'セッション完了'}</button>
  </div>`;

  document.getElementById('training-content').innerHTML = html;
  document.getElementById('headerTitle').textContent = '今日のトレーニング';
  document.getElementById('headerSub').textContent = fmtDate(session.date);
}

let restCheckTimestamps = []; // セット完了チェックの実時刻（休憩実測用）

function toggleSet(idx) {
  const btn = document.querySelector(`#mainset-${idx} .set-done`);
  btn.classList.toggle('checked');
  // チェックON時のみ休憩タイマーを開始（種別に応じた推奨休憩）
  if (btn.classList.contains('checked')) {
    restCheckTimestamps.push(Date.now());
    const s = state.currentSession;
    const heavy = s && (s.isMaxDay || s.phaseName === 'peaking' || s.type === 'main');
    startRest(heavy ? 180 : 120);
  }
}

function completeSession() {
  if (!state.currentSession) return;
  const s = state.currentSession;
  state.completedSessions[s.date + s.type] = true;
  save();
  renderProgram();

  // Update training screen
  document.querySelector('.btn-success').disabled = true;
  document.querySelector('.btn-success').textContent = '✓ 完了済み';
  document.querySelector('.btn-success').style.opacity = '.5';

  setTimeout(() => {
    alert('セッション完了！お疲れ様でした💪');
  }, 100);
}
