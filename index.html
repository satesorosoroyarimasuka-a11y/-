function selectSetRPE(i, v) {
  document.querySelectorAll(`#rpeDots-${i} .rpe-dot`).forEach(d => d.classList.remove('active'));
  event.target.classList.add('active');
  event.target.dataset.val = v;
}

function selectFatigue(v) {
  document.querySelectorAll('#fatigueDots .rpe-dot').forEach(d => d.classList.remove('active'));
  event.target.classList.add('active');
  event.target.dataset.val = v;
}

function saveLog() {
  const s = state.currentSession;
  const logKey = s.date + '_' + s.type;
  const sets = s.mainSets.map((set, i) => {
    const rpeEl = document.querySelector(`#rpeDots-${i} .rpe-dot.active`);
    return {
      weight: +document.getElementById(`log-w-${i}`).value || set.weight,
      reps: +document.getElementById(`log-r-${i}`).value || set.reps,
      rpe: rpeEl ? +rpeEl.dataset.val : null,
    };
  });
  // セッション代表RPE＝トップセット（最重量）自身のRPE。他の記録(週平均RPE等)との互換のため保持
  let topIdx = 0;
  sets.forEach((set, i) => { if (set.weight > sets[topIdx].weight) topIdx = i; });
  const rpe = sets[topIdx].rpe || 0;
  const fatigueEl = document.querySelector('#fatigueDots .rpe-dot.active');
  const fatigue = fatigueEl ? +fatigueEl.dataset.val : null;
  const notes = document.getElementById('log-notes').value;
  const restActual = restCheckTimestamps.length > 1
    ? restCheckTimestamps.slice(1).map((t, i) => Math.round((t - restCheckTimestamps[i]) / 1000))
    : [];
  restCheckTimestamps = [];

  // Remove existing
  state.records = state.records.filter(r => r.key !== logKey);
  const newRec = { key: logKey, date: s.date, type: s.type, sets, rpe, fatigue, notes, restActual, timestamp: Date.now() };
  state.records.push(newRec);
  state.records.sort((a,b) => a.date.localeCompare(b.date));
  // 基準1RM(trainingMax)はMAXテスト日の記録でのみ静かに更新する
  maybeUpdateTrainingMax(newRec, s);
  save();

  closeLogModal();
  renderTraining(state.currentSession);
  renderRecords();
  renderProgram();

  // 記録を分析し、必要ならプログラム変更を「提案」する（自動では変えない）
  const plan = planRecalibration(s, sets);
  if (plan && plan.changed) {
    setTimeout(() => confirmAndApply(plan), 150);
  } else if (plan && plan.noRpe) {
    setTimeout(() => alert('記録を保存しました。トップセット（最重量セット）のRPEを入力すると、実力に合わせたプログラム自動調整が行われます。'), 150);
  } else if (plan) {
    setTimeout(() => alert('記録を保存しました。分析の結果、プログラムは現状維持が最適です 👍'), 150);
  } else {
    setTimeout(() => alert('記録を保存しました。'), 150);
  }
}

// 基準1RM(trainingMax)は「MAXテスト日」の記録でのみ更新する。
// メイン/ピーキング日の高強度シングルも計画通りにこなす練習であり、
// 本当の限界を試すMAXテスト日と同じ確度では扱わない。
// プログラム期間の伸縮判断（planRecalibration）とは独立に、表示・今後の判断で使う
// 基準値を最新の実測に保つのが目的。
function maybeUpdateTrainingMax(rec, sess) {
  if (!state.profile || !rec || !sess?.isMaxDay) return false;
  const raw = round25(recordE1RM(rec));
  if (!raw) return false;
  const cur = state.profile.trainingMax ?? state.profile.currentMax;
  if (Math.abs(raw - cur) < 1.25) return false;
  state.profile.trainingMax = raw;
  if (state.program) state.program.profile = state.profile;
  return true;
}

// ===== 記録に基づくプログラム修正の「計算」（stateは変更しない）=====
// 記録のトップセット（最重量セット）のRPE補正推定1RM（recordE1RM＝分析画面と同一基準）を
// そのまま現在の実力として採用し、未実施の以降セッションを再構築した案を返す。
// ※以前は「計画セットとの比率」でrm1をスケールしていたが、計画セットは設計上余裕のある
//   重量（RPE7〜8想定）なのに限界扱い（Epley素）で評価していたため、計画どおりこなすだけで
//   毎回+5〜7%の上方修正が提案され、プログラムが実力から乖離するバグがあった。
function planRecalibration(session, loggedSets) {
  if (!state.program || !session.mainSets || !session.mainSets.length) return null;

  const rec = state.records.find(r => r.key === session.date + '_' + session.type);
  if (!rec) return { changed: false };
  const top = topSetOf(rec);
  if (!top || !top.weight || !top.reps) return { changed: false };
  // RPEが無いと余力が不明で実力を測れない（限界扱いすると誤って下方修正される）ため提案しない
  if (top.rpe == null && !rec.rpe) return { changed: false, noRpe: true };

  const rawAchievedRM = round25(recordE1RM(rec));
  const prevRM = session.rm1;
  // ボリューム/テクニック日など信頼度が低い記録ほど、計画値(prevRM)からの乖離を小さく評価する。
  // メイン/MAXテスト日は信頼度が高く、ほぼそのまま実力とみなす。
  const confidence = e1rmConfidence(rec, session);
  const achievedRM = round25(prevRM + confidence * (rawAchievedRM - prevRM));
  const delta = achievedRM - prevRM;

  // ほぼ計画通り（±2.5kg未満）なら修正不要
  if (Math.abs(delta) < 2.5) return { changed: false, newRM: achievedRM, prevRM, delta, confidence };

  // プロフィールはクローンして計算（liveなstateは変更しない）
  const p = { ...state.profile };
  const rate = planRatePerWeek(p); // 実力レベル・年齢に応じたエビデンスペース
  const anchorWeek = session.weekIdx;

  const pastRM = {};
  state.program.sessions.forEach(s => { if (s.weekIdx <= anchorWeek) pastRM[s.weekIdx] = s.rm1; });
  pastRM[anchorWeek] = achievedRM;

  const origRemaining = p.totalWeeks - 1 - anchorWeek;
  let remaining = origRemaining;
  // 分割ロードマップ中はこのブロックの目標(blockTarget)に向けて再計算する
  const blockTgt = p.blockTarget || p.targetMax;
  const neededGain = blockTgt - achievedRM;

  if (neededGain > 0) {
    if (remaining <= 0) {
      remaining = Math.max(2, Math.ceil(neededGain / rate));
    } else if (neededGain / remaining > rate) {
      remaining = Math.ceil(neededGain / rate); // 速すぎる→延長
    } else {
      const shortest = Math.max(2, Math.ceil(neededGain / rate));
      remaining = Math.min(remaining, shortest); // 好調→短縮
    }
  } else {
    remaining = Math.min(remaining, 4); // すでに目標到達→確認期間のみ
  }

  let newTotal = Math.min(anchorWeek + 1 + remaining, 52);
  remaining = newTotal - anchorWeek - 1;
  const extendedWeeks = remaining - origRemaining;
  p.totalWeeks = newTotal;

  const perWeek = remaining > 0 ? Math.max(0, neededGain) / remaining : 0;
  const rmForWeek = (w) => {
    if (w <= anchorWeek) return pastRM[w] !== undefined ? pastRM[w] : achievedRM;
    if (w >= newTotal - 1) return blockTgt;
    if (programPhase(newTotal, w).name === 'deload') return round125(achievedRM + perWeek * (w - 1 - anchorWeek));
    return round125(achievedRM + perWeek * (w - anchorWeek));
  };

  // 完了済み・記録済みは維持し、未実施分のみ再構築（案を組む・stateは触らない）
  const oldByKey = {};
  state.program.sessions.forEach(s => oldByKey[s.date + s.type] = s);
  const rebuilt = buildProgramSessions(p, rmForWeek);
  rebuilt.forEach((s, i) => {
    const key = s.date + s.type;
    const hasRecord = state.records.some(r => r.key === s.date + '_' + s.type);
    if ((state.completedSessions[key] || hasRecord) && oldByKey[key]) {
      rebuilt[i] = oldByKey[key];
    }
  });

  return { changed: true, newRM: achievedRM, prevRM, delta, confidence, extendedWeeks, newTotal, rebuilt, newProfile: p };
}

// 提案を実際に適用する
function applyRecalibration(plan) {
  if (!plan || !plan.changed || !plan.rebuilt) return;
  state.profile = plan.newProfile;
  state.program.profile = plan.newProfile;
  state.program.sessions = plan.rebuilt;
  if (state.currentSession) {
    const cs = state.program.sessions.find(s => s.date === state.currentSession.date && s.type === state.currentSession.type);
    if (cs) state.currentSession = cs;
  }
  validateAndOptimize();
  save();
}

// 分析結果を提示して「変更しますか？」と確認 → 承認時のみ適用
function confirmAndApply(plan) {
  if (!plan || !plan.changed) return;
  const dir = plan.delta < 0 ? '下方修正' : '上方修正';
  let msg = '【記録の分析結果】\n';
  msg += `実績（RPE補正）から現在の推定1RMは ${plan.prevRM}kg → ${plan.newRM}kg（${dir}）と評価しました。\n\n`;
  if (plan.confidence != null && plan.confidence < 0.45) {
    msg += '（ボリューム/テクニック日の記録のため、計画値からの乖離は弱めに反映しています）\n\n';
  }
  if (plan.extendedWeeks > 0) {
    msg += `📉 安全なペースを保つため、期間を ${plan.extendedWeeks}週間 延長する提案です（全${plan.newTotal}週間）。`;
  } else if (plan.extendedWeeks < 0) {
    msg += plan.delta > 0
      ? `📈 好調のため、期間を ${-plan.extendedWeeks}週間 短縮できます（全${plan.newTotal}週間）。`
      : `📐 実力に合わせて残り期間を再計算し、${-plan.extendedWeeks}週間 短縮します（全${plan.newTotal}週間）。`;
  } else {
    msg += `以降のメニュー重量を再計算します（期間は変更なし・全${plan.newTotal}週間）。`;
  }
  msg += '\n\nこの内容でプログラムを変更しますか？';

  if (confirm(msg)) {
    applyRecalibration(plan);
    renderProgram();
    if (state.currentSession) renderTraining(state.currentSession);
    if (document.getElementById('screen-analysis').classList.contains('active')) renderAnalysis();
    setTimeout(() => alert('プログラムを更新しました 💪'), 100);
  }
}

// 分析画面の「メニューを見直す」ボタン：最新の記録から提案を出す
function proposeAdjustFromAnalysis() {
  const rec = [...state.records].reverse().find(r =>
    state.program && state.program.sessions.some(s => s.date === r.date && s.type === r.type));
  if (!rec) { alert('メニュー調整には記録の入力が必要です。'); return; }
  const sess = state.program.sessions.find(s => s.date === rec.date && s.type === rec.type);
  if (maybeUpdateTrainingMax(rec, sess)) save();
  const plan = planRecalibration(sess, rec.sets);
  if (plan && plan.noRpe) {
    alert('最新の記録にRPEが入力されていないため、実力を評価できません。記録を開いてトップセット（最重量セット）のRPEを入力してください。');
    return;
  }
  if (!plan || !plan.changed) {
    alert('記録を分析した結果、現在のプログラムが最適です。変更の必要はありません 👍');
    return;
  }
  confirmAndApply(plan);
}

// 週ごとの平均RPEを返す（プログラム週 weekIdx 単位）
function weeklyRpeSeries() {
  const map = {};
  if (!state.program) return { keys: [], labels: [], data: [] };
  state.records.forEach(r => {
    if (!r.rpe) return;
    const sess = state.program.sessions.find(s => s.date === r.date && s.type === r.type);
    if (!sess) return;
    const w = sess.weekIdx;
    (map[w] = map[w] || { sum: 0, count: 0 });
    map[w].sum += r.rpe; map[w].count++;
  });
  const keys = Object.keys(map).map(Number).sort((a, b) => a - b);
  return {
    keys,
    labels: keys.map(w => `W${w + 1}`),
    data: keys.map(w => +(map[w].sum / map[w].count).toFixed(2)),
  };
}

// ===== エビデンスベースの負荷・実力指標 =====

// 日付ごとのトーナジ（総挙上量 kg）を返す { 'YYYY-MM-DD': tonnage }
function dailyLoadMap() {
  const map = {};
  state.records.forEach(r => {
    if (!r.sets) return;
    const t = r.sets.reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0);
    map[r.date] = (map[r.date] || 0) + t;
  });
  return map;
}

// ACWR（急性:慢性負荷比 / Gabbett）。急性=直近7日、慢性=直近28日の週平均
function calcACWR() {
  const map = dailyLoadMap();
  const dates = Object.keys(map);
  if (!dates.length) return null;
  const today = new Date();
  let acute = 0, chronic = 0;
  let earliest = null;
  dates.forEach(d => {
    const diff = (today - new Date(d)) / 86400000;
    if (diff < 0 || diff >= 28) return;
    chronic += map[d];
    if (diff < 7) acute += map[d];
    if (earliest === null || new Date(d) < earliest) earliest = new Date(d);
  });
  const chronicWeekly = chronic / 4;
  // 慢性負荷の履歴が3週未満なら比率は信頼できない（算出中扱い）
  const spanDays = earliest ? (today - earliest) / 86400000 : 0;
  const established = spanDays >= 21 && chronicWeekly > 0;
  const ratio = chronicWeekly > 0 ? acute / chronicWeekly : null;
  return { acute, chronicWeekly, ratio, established };
}

// Foster法：モノトニー（負荷の単調さ）と週間ストレイン
// セッション負荷はsRPE近似（RPE × セット数 × 10）
function fosterMetrics() {
  const today = new Date();
  const daily = new Array(7).fill(0);
  let trainDays = 0;
  state.records.forEach(r => {
    if (!r.sets || !r.sets.length) return;
    const diff = Math.floor((today - new Date(r.date)) / 86400000);
    if (diff < 0 || diff >= 7) return;
    daily[diff] += (r.rpe || 8) * r.sets.length * 10;
  });
  daily.forEach(v => { if (v > 0) trainDays++; });
  if (trainDays <= 1) return null; // SD=0になり計算不能
  const meanL = daily.reduce((a, b) => a + b, 0) / 7;
  const sd = Math.sqrt(daily.reduce((a, b) => a + (b - meanL) ** 2, 0) / 7);
  if (sd === 0) return null;
  const monotony = meanL / sd;
  const weekLoad = daily.reduce((a, b) => a + b, 0);
  return { monotony, strain: weekLoad * monotony, weekLoad };
}

// 指定日以前の最新体重（無ければプロフィール体重）
function bwAt(date) {
  let bw = state.profile ? state.profile.weight : null;
  for (const b of state.bodyweights) {
    if (b.date <= date) bw = b.weight; else break;
  }
  return bw;
}

// IPF GLポイント（クラシック・ベンチ単体）
function ipfGL(e1rm, bw) {
  if (!e1rm || !bw) return null;
  const female = state.profile && state.profile.sex === 'female';
  const [A, B, C] = female
    ? [142.40398, 442.52671, 0.04724]
    : [320.98041, 281.40258, 0.01008];
  const denom = A - B * Math.exp(-C * bw);
  return denom > 0 ? e1rm * 100 / denom : null;
}

// 相対筋力の推移（体重比とIPF GLポイント）
// 各点の信頼度(e1rmConfidence)とMAXテスト日フラグも一緒に返す。
// 折れ線自体は記録ベースの推移として残すが、点の見た目(色・サイズ)や
// 「現在」の要約値の算出には呼び出し側で信頼度を使う（生値をそのまま実力として扱わない）。
function relStrengthSeries() {
  const labels = [], ratio = [], gl = [], confs = [], isMax = [];
  state.records.forEach(r => {
    if (!r.sets || !r.sets.length) return;
    const bw = bwAt(r.date);
    if (!bw) return;
    const sess = sessionForRecord(r);
    const e = recordE1RM(r);
    labels.push(fmtDate(r.date));
    ratio.push(+(e / bw).toFixed(2));
    const g = ipfGL(e, bw);
    gl.push(g != null ? +g.toFixed(1) : null);
    confs.push(e1rmConfidence(r, sess));
    isMax.push(!!sess?.isMaxDay);
  });
  return { labels, ratio, gl, confs, isMax };
}

// 推定1RMの推移に線形回帰をかけ、伸びペースと目標到達予測日を返す
function regressionForecast() {
  const recs = state.records.filter(r => r.sets && r.sets.length);
  if (recs.length < 4 || !state.profile) return null;
  const use = recs.slice(-8);
  const t0 = new Date(use[0].date);
  // ボリューム/テクニック日のブレが伸びペースの回帰を歪めないよう、信頼度で加重した最小二乗にする
  const pts = use.map(r => ({
    x: (new Date(r.date) - t0) / 86400000,
    y: recordE1RM(r),
    w: e1rmConfidence(r, sessionForRecord(r)),
  }));
  const sw = pts.reduce((a, p) => a + p.w, 0) || pts.length;
  const mx = pts.reduce((a, p) => a + p.w * p.x, 0) / sw;
  const my = pts.reduce((a, p) => a + p.w * p.y, 0) / sw;
  let sxy = 0, sxx = 0;
  pts.forEach(p => { sxy += p.w * (p.x - mx) * (p.y - my); sxx += p.w * (p.x - mx) ** 2; });
  if (sxx === 0) return null;
  const slope = sxy / sxx;             // kg/日
  const intercept = my - slope * mx;
  const perWeek = slope * 7;
  const target = state.profile.targetMax;
  const current = intercept + slope * ((new Date() - t0) / 86400000);
  let reachDate = null;
  if (slope > 0 && current < target) {
    const daysTo = (target - intercept) / slope;
    reachDate = new Date(t0.getTime() + daysTo * 86400000);
  } else if (current >= target) {
    reachDate = new Date();
  }
  // プログラム終了予定日
  let planEnd = null;
  if (state.program && state.program.sessions.length) {
    planEnd = new Date(state.program.sessions[state.program.sessions.length - 1].date);
  }
  const diffWeeks = (reachDate && planEnd) ? (reachDate - planEnd) / (86400000 * 7) : null;
  return { perWeek, current, target, reachDate, planEnd, diffWeeks };
}

// ===== コンディション5段階評価 =====
// 直近の記録から「調子」を分析し、5段階（絶好調〜全然不調）で返す。
function analyzeCondition() {
  const recs = state.records.filter(r => r.sets && r.sets.length);
  if (recs.length < 2) return null;
  const recent = recs.slice(-4); // 直近4回
  const mean = a => a.reduce((x, y) => x + y, 0) / a.length;

  // 各記録のRPE補正推定1RMと、日タイプ/RPEに基づく信頼度
  // （ボリューム/テクニック日のブレに調子スコアが引きずられないよう重み付けする）
  const es = recent.map(r => recordE1RM(r));
  const sessOf = recent.map(r => sessionForRecord(r));
  const confs = recent.map((r, i) => e1rmConfidence(r, sessOf[i]));
  const wmean = (arr, w) => {
    const sw = w.reduce((a, b) => a + b, 0);
    return sw ? arr.reduce((a, v, i) => a + v * w[i], 0) / sw : mean(arr);
  };

  // 計画（その日の推定1RM）に対する実力比（信頼度加重平均）
  const perfPairs = [];
  recent.forEach((r, i) => {
    const sess = sessOf[i];
    if (sess && sess.rm1) perfPairs.push({ v: es[i] / sess.rm1, w: confs[i] });
  });
  const avgPerf = perfPairs.length ? wmean(perfPairs.map(p => p.v), perfPairs.map(p => p.w)) : 1;

  // モメンタム（前半平均 → 後半平均の伸び、信頼度加重）
  const half = Math.max(1, Math.floor(es.length / 2));
  const momentum = es.length >= 2
    ? wmean(es.slice(-half), confs.slice(-half)) - wmean(es.slice(0, half), confs.slice(0, half))
    : 0;

  // 平均RPE
  const rpeR = recent.filter(r => r.rpe);
  const avgRpe = rpeR.length ? mean(rpeR.map(r => r.rpe)) : null;

  // スコア化（0〜100）
  let score = 50 + (avgPerf - 1) * 400 + momentum * 4;

  // 体重・体脂肪トレンドを加味（直近28日以内の変化）
  let bwReason = null, fatReason = null;
  const bws = state.bodyweights;
  if (bws.length >= 2) {
    const last = bws[bws.length - 1];
    const cutoff = new Date(last.date); cutoff.setDate(cutoff.getDate() - 28);
    const prior = bws.find(b => new Date(b.date) >= cutoff) || bws[bws.length - 2];
    const bwDelta = last.weight - prior.weight;
    const pct = prior.weight ? bwDelta / prior.weight * 100 : 0;
    // 体脂肪の変化（両方に記録があるときのみ）
    const fatDelta = (last.fat != null && prior.fat != null) ? last.fat - prior.fat : null;

    if (bwDelta <= -1 && pct <= -1.2) {
      // 減量局面：体脂肪が同時に落ちていれば筋量は保たれている可能性が高い
      if (fatDelta != null && fatDelta <= -0.3) {
        score -= 3;
        bwReason = `体重 ${bwDelta.toFixed(1)}kg・体脂肪 ${fatDelta.toFixed(1)}% と減少（順調な減量。挙上を維持できていれば問題なし）`;
      } else if (fatDelta != null && fatDelta >= 0.2) {
        score -= 8;
        bwReason = `体重減の一方で体脂肪は +${fatDelta.toFixed(1)}%（筋量低下の懸念。栄養・回復を見直しましょう）`;
      } else {
        score -= 6;
        bwReason = `体重が減少傾向（${bwDelta.toFixed(1)}kg）。リカバリー不足に注意`;
      }
    } else if (bwDelta >= 0.5) {
      score += 3;
      bwReason = `体重が増加傾向（+${bwDelta.toFixed(1)}kg）で出力を支えています`;
      if (fatDelta != null && fatDelta >= 0.5) fatReason = `ただし体脂肪も +${fatDelta.toFixed(1)}%（増量ペースに注意）`;
    } else {
      bwReason = `体重はほぼ安定（${bwDelta >= 0 ? '+' : ''}${bwDelta.toFixed(1)}kg）`;
      if (fatDelta != null && Math.abs(fatDelta) >= 0.3) fatReason = `体脂肪は ${fatDelta >= 0 ? '+' : ''}${fatDelta.toFixed(1)}%`;
    }
  }

  // 週平均RPEの推移（上昇＝疲労蓄積のサイン）
  let rpeTrendReason = null;
  const wr = weeklyRpeSeries();
  const wrTrend = wr.data.length >= 2 ? wr.data[wr.data.length - 1] - wr.data[wr.data.length - 2] : 0;
  if (wr.data.length >= 2) {
    if (wrTrend >= 0.7) { score -= 4; rpeTrendReason = `週平均RPEが上昇中（+${wrTrend.toFixed(1)}）。疲労が溜まりつつあります`; }
    else if (wrTrend <= -0.7) { score += 2; rpeTrendReason = `週平均RPEが低下（${wrTrend.toFixed(1)}）。疲労が抜けてきています`; }
  }

  // 主観的疲労チェックイン（記録時の自己申告）
  let fatigueReason = null;
  const fatigueRecs = recent.filter(r => r.fatigue != null);
  if (fatigueRecs.length) {
    const avgFatigue = mean(fatigueRecs.map(r => r.fatigue));
    if (avgFatigue <= 2) {
      score -= 4;
      fatigueReason = `自己申告の体調が低め（平均${avgFatigue.toFixed(1)}/5）`;
    } else if (avgFatigue >= 4) {
      score += 2;
      fatigueReason = `自己申告の体調は良好（平均${avgFatigue.toFixed(1)}/5）`;
    }
  }

  // ACWR（急性:慢性負荷比）— 急激な負荷増は怪我リスク
  let acwrReason = null, acwrSuggest = null;
  const acwr = calcACWR();
  if (acwr && acwr.established && acwr.ratio != null) {
    if (acwr.ratio > 1.5) {
      score -= 8;
      acwrReason = `ACWR ${acwr.ratio.toFixed(2)}：急激な負荷増。怪我リスクが高い状態です`;
      acwrSuggest = '直近の負荷が急増しています（ACWR>1.5）。今週はディロード（負荷を落とす）ことを強く推奨します。';
    } else if (acwr.ratio > 1.3) {
      score -= 4;
      acwrReason = `ACWR ${acwr.ratio.toFixed(2)}：負荷がやや増えすぎです（1.3以下が安全域）`;
    } else if (acwr.ratio < 0.8) {
      score -= 2;
      acwrReason = `ACWR ${acwr.ratio.toFixed(2)}：負荷が落ちてデトレーニング気味です`;
    } else {
      acwrReason = `ACWR ${acwr.ratio.toFixed(2)}：負荷の増やし方は最適な範囲です`;
    }
  }

  // モノトニー（Foster法）— 毎日同じ負荷はオーバートレーニングの温床
  let monoReason = null;
  const fm = fosterMetrics();
  if (fm) {
    if (fm.monotony > 2.0) {
      score -= 4;
      monoReason = `モノトニー ${fm.monotony.toFixed(1)}：トレーニングが単調です（強弱の波をつけましょう）`;
    } else if (fm.monotony > 1.5) {
      monoReason = `モノトニー ${fm.monotony.toFixed(1)}：やや単調。高負荷日と軽い日のメリハリを意識`;
    }
  }

  // 相対筋力 — 減量中でも体重比が伸びていればポジティブに評価。
  // 「開始時(currentMax)」と「現在(trainingMax優先)」という検証済みの数値同士を比較し、
  // ボリューム/テクニック日の推定値のブレでスコアが左右されないようにする
  // （relStrengthSeries()の生値そのままの比較はしない）。
  let relReason = null;
  const p = state.profile;
  if (p && p.currentMax) {
    const nowBw = bws.length ? bws[bws.length - 1].weight : p.weight;
    const startBw = bwAt(p.startDate) || p.weight;
    const nowRM = p.trainingMax ?? p.currentMax;
    if (nowBw && startBw) {
      const relDelta = (nowRM / nowBw) - (p.currentMax / startBw);
      if (bwReason && bwReason.includes('減') && relDelta >= 0.02) {
        score += 3;
        relReason = `体重比は ${(nowRM / nowBw).toFixed(2)}倍 に向上中（減量しながら相対筋力アップ）`;
      }
    }
  }

  score = Math.max(0, Math.min(100, score));

  let level, label, color, emoji;
  if (score >= 75) { level = 5; label = '絶好調'; color = 'var(--green)'; emoji = '🔥'; }
  else if (score >= 60) { level = 4; label = 'やや好調'; color = '#4ade80'; emoji = '💪'; }
  else if (score >= 40) { level = 3; label = '普通'; color = 'var(--accent2)'; emoji = '🙂'; }
  else if (score >= 25) { level = 2; label = 'やや不調'; color = 'var(--yellow)'; emoji = '😐'; }
  else { level = 1; label = '全然不調'; color = 'var(--red)'; emoji = '😟'; }

  const reasons = [];
  if (momentum > 1) reasons.push(`直近で推定1RMが +${momentum.toFixed(1)}kg 伸びています`);
  else if (momentum < -1) reasons.push(`直近で推定1RMが ${momentum.toFixed(1)}kg 下降しています`);
  else reasons.push('推定1RMはほぼ横ばいです');
  if (avgPerf > 1.03) reasons.push('計画重量に対して実力が上回っています');
  else if (avgPerf < 0.97) reasons.push('計画重量に対して実力がやや不足しています');
  else reasons.push('計画どおりのペースで進んでいます');
  if (avgRpe !== null) {
    if (avgRpe >= 9) reasons.push(`平均RPE ${avgRpe.toFixed(1)} と高め（疲労傾向あり）`);
    else if (avgRpe <= 7) reasons.push(`平均RPE ${avgRpe.toFixed(1)} と余力あり`);
  }
  if (bwReason) reasons.push(bwReason);
  if (fatReason) reasons.push(fatReason);
  if (relReason) reasons.push(relReason);
  if (rpeTrendReason) reasons.push(rpeTrendReason);
  if (acwrReason) reasons.push(acwrReason);
  if (monoReason) reasons.push(monoReason);
  if (fatigueReason) reasons.push(fatigueReason);

  let suggest = null;
  if (acwrSuggest) suggest = acwrSuggest; // 怪我リスクは最優先で提示
  else if (level >= 4) suggest = 'この調子なら目標達成を前倒しできる可能性があります。メニューの短縮を検討できます。';
  else if (level <= 2) suggest = '無理は禁物です。期間を延ばし、負荷を落として安全に伸ばすことを検討しましょう。';
  // 疲労が明確なら、レベルに関わらず回復優先の助言を出す
  if (wrTrend >= 0.7 && !suggest) {
    suggest = '週平均RPEが上がっています。ディロードや期間延長で回復を優先することを検討しましょう。';
  }
  // 回帰予測が予定より大きく遅れていれば期間延長を促す
  const fc = regressionForecast();
  if (!suggest && fc && fc.diffWeeks != null && fc.diffWeeks >= 2) {
    suggest = `現在の伸びペースだと目標到達は予定より約${Math.round(fc.diffWeeks)}週遅れる見込みです。期間延長の検討をおすすめします。`;
  }

  return { score, level, label, color, emoji, reasons, suggest };
}

function closeLogModal() { document.getElementById('logModal').classList.remove('open'); }

// ===== RECORDS =====
// 体重記録カードのHTML（記録画面の先頭に表示）
function bodyweightCardHTML() {
  const today = new Date().toISOString().split('T')[0];
  const bws = state.bodyweights;
  const latest = bws.length ? bws[bws.length - 1] : null;
  let trend = '';
  if (bws.length >= 2) {
    const d = latest.weight - bws[bws.length - 2].weight;
    const sign = d > 0 ? '+' : '';
    const col = d > 0 ? 'var(--yellow)' : d < 0 ? 'var(--accent2)' : 'var(--text2)';
    trend = `<span style="color:${col};font-size:12px">前回比 ${sign}${d.toFixed(1)}kg</span>`;
  }
  let listHtml = '';
  if (bws.length) {
    listHtml = '<div class="divider"></div>' + [...bws].reverse().slice(0, 6).map(b =>
      `<div class="record-row" style="padding:8px 0">
        <div style="font-size:13px">${fmtDate(b.date)}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-weight:700;color:var(--accent2)">${b.weight}kg</span>
          ${b.fat != null ? `<span style="font-size:12px;color:var(--yellow)">体脂肪 ${b.fat}%</span>` : ''}
          <button onclick="deleteBodyweight('${b.date}')" style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;line-height:1">×</button>
        </div>
      </div>`).join('');
  }
  return `<div class="card">
    <div class="card-title">⚖️ 体重・体脂肪を記録</div>
    ${latest ? `<div style="margin-bottom:10px">最新: <strong style="font-size:18px">${latest.weight}kg</strong>${latest.fat != null ? ` / 体脂肪 <strong>${latest.fat}%</strong>` : ''} ${trend}</div>` : '<div style="font-size:13px;color:var(--text2);margin-bottom:10px">体重・体脂肪を入力すると分析・コンディション判定に反映されます。</div>'}
    <input type="date" id="bw-date" value="${today}" style="font-size:14px;margin-bottom:8px">
    <div style="display:flex;gap:8px;align-items:center">
      <input type="number" id="bw-weight" placeholder="体重" step="0.1" style="flex:1;font-size:14px">
      <span style="color:var(--text2)">kg</span>
      <input type="number" id="bw-fat" placeholder="体脂肪(任意)" step="0.1" style="flex:1;font-size:14px">
      <span style="color:var(--text2)">%</span>
    </div>
    <button class="btn btn-primary btn-sm" onclick="saveBodyweight()" style="width:100%;margin-top:10px">記録する</button>
    ${listHtml}
  </div>`;
}

function renderRecords() {
  const records = state.records;
  let html = bodyweightCardHTML();

  if (records.length === 0) {
    html += `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
      <p>まだトレーニング記録がありません</p>
    </div>`;
    document.getElementById('records-content').innerHTML = html;
    return;
  }

  // Summary stats（RPE補正推定1RM＝分析画面・プログラム再調整と同一基準に統一）
  // 「最高」は基準1RM(trainingMax、MAXテスト実測)を優先。練習日の推定値がそれを上回っても
  // 未検証の参考値として注記し、無条件に「最高記録」扱いしない。
  const bestFromRecords = Math.max(...records.map(r => recordE1RM(r)));
  const tmRec = state.profile?.trainingMax ?? null;
  const bestEstimate = tmRec != null ? Math.max(tmRec, bestFromRecords) : bestFromRecords;
  const bestUnverified = tmRec != null && bestFromRecords > tmRec;
  const totalSets = records.reduce((a,r) => a + r.sets.length, 0);
  const totalVol = records.reduce((a,r) => a + r.sets.reduce((b,s) => b + s.weight * s.reps, 0), 0);

  html += `<div class="stat-grid">
    <div class="stat-box"><div class="stat-val">${Math.round(bestEstimate)}</div><div class="stat-unit">kg</div><div class="stat-lbl">推定1RM (最高)${bestUnverified ? '<br><span style="font-size:9px">※MAXテスト未確認</span>' : ''}</div></div>
    <div class="stat-box"><div class="stat-val">${records.length}</div><div class="stat-unit">回</div><div class="stat-lbl">セッション数</div></div>
    <div class="stat-box"><div class="stat-val">${totalSets}</div><div class="stat-unit">set</div><div class="stat-lbl">総セット数</div></div>
    <div class="stat-box"><div class="stat-val">${Math.round(totalVol/1000)}t</div><div class="stat-unit"></div><div class="stat-lbl">総挙上量</div></div>
  </div>`;

  html += '<div class="card"><div class="card-title">記録一覧</div>';
  const typeLabels = { volume:'ボリューム', technique:'テクニック', main:'メイン', MAX_TEST:'MAXテスト' };

  [...records].reverse().forEach(r => {
    const sess = sessionForRecord(r);
    const conf = e1rmConfidence(r, sess);
    const ci = confidenceLabel(conf, sess?.isMaxDay);
    const rpeRM = Math.round(recordE1RM(r));
    html += `<div class="record-row" onclick="openSession('${r.date}','${r.type}')">
      <div>
        <div style="font-size:14px;font-weight:600">${fmtDate(r.date)}</div>
        <div style="font-size:12px;color:var(--text2)">${typeLabels[r.type] || r.type} · ${r.sets.length}セット
          <span style="color:${ci.color}"> ${ci.badge} ${ci.label}</span></div>
        ${r.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:2px">${r.notes}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div style="font-size:16px;font-weight:700;color:var(--accent2)">${r.sets[0]?.weight || '-'}kg</div>
        <div style="font-size:12px;color:var(--text2)">推定RM ${rpeRM}kg</div>
        ${r.rpe ? `<div style="font-size:12px;color:var(--yellow)">RPE ${r.rpe}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';

  // Delete all button
  html += `<button class="btn btn-outline" style="color:var(--red);border-color:var(--red);margin-top:8px" onclick="clearRecords()">記録をすべて削除</button>`;

  document.getElementById('records-content').innerHTML = html;
}

function clearRecords() {
  if (!confirm('すべての記録を削除しますか？')) return;
  state.records = [];
  save();
  renderRecords();
}

// ===== 体重記録 =====
function saveBodyweight() {
  const dateEl = document.getElementById('bw-date');
  const wEl = document.getElementById('bw-weight');
  const fatEl = document.getElementById('bw-fat');
  const date = dateEl.value;
  const weight = +wEl.value;
  const fat = fatEl.value !== '' ? +fatEl.value : null; // 体脂肪率は任意
  if (!date || !weight) { alert('日付と体重を入力してください'); return; }
  // 同じ日付があれば上書き
  state.bodyweights = state.bodyweights.filter(b => b.date !== date);
  state.bodyweights.push({ date, weight, fat });
  state.bodyweights.sort((a, b) => a.date.localeCompare(b.date));
  // プロフィールの体重も最新値に同期（プログラム表示等で使用）
  if (state.profile) {
    const latest = state.bodyweights[state.bodyweights.length - 1];
    state.profile.weight = latest.weight;
  }
  save();
  wEl.value = '';
  fatEl.value = '';
  renderRecords();
  alert(`体重 ${weight}kg${fat != null ? ` / 体脂肪 ${fat}%` : ''}（${fmtDate(date)}）を記録しました。`);
}

function deleteBodyweight(date) {
  if (!confirm(`${fmtDate(date)} の体重記録を削除しますか？`)) return;
  state.bodyweights = state.bodyweights.filter(b => b.date !== date);
  save();
  renderRecords();
}

// ===== ANALYSIS =====
let charts = {};
function renderAnalysis() {
  const records = state.records;
  const latestBw = state.bodyweights.length ? state.bodyweights[state.bodyweights.length - 1].weight : (state.profile?.weight || null);
  if (records.length < 2) {
    document.getElementById('analysis-content').innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <p>グラフを表示するには<br>2回以上の記録が必要です</p>
    </div>`;
    return;
  }

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const labels = records.map(r => fmtDate(r.date));
  const estRMs = records.map(r => Math.round(Math.max(...r.sets.map(s => epley(s.weight, s.reps)))));
  // RPE補正推定1RM（記録のRPEから「あと何回できたか」を加味）
  const rpeRMs = records.map(r => Math.round(recordE1RM(r)));
  const maxWeights = records.map(r => Math.max(...r.sets.map(s => s.weight)));
  const volumes = records.map(r => Math.round(r.sets.reduce((a,s) => a + s.weight * s.reps, 0)));
  // トレーニング画面と同じ基準（その日の計画1RM=rm1）でINOLを算出（記録自体から逆算するとブレるため）
  const inols = records.map(r => {
    const sess = state.program?.sessions.find(s => s.date === r.date && s.type === r.type);
    const rm = sess ? sess.rm1 : Math.max(...r.sets.map(s => epley(s.weight, s.reps)));
    return +r.sets.reduce((a,s) => {
      const pct = Math.round(s.weight / rm * 100);
      return a + calcINOL(1, s.reps, pct);
    }, 0).toFixed(2);
  });

  const profile = state.profile;
  const targetMax = profile?.targetMax || null;

  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#94a3b8', maxTicksLimit: 6, font: { size: 11 } }, grid: { color: 'rgba(255,255,255,.05)' } },
      y: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,.05)' } }
    }
  };

  // ===== サマリー統計 =====
  const latestRpeRM = rpeRMs[rpeRMs.length - 1];
  const firstRpeRM = rpeRMs[0];
  const rpeRecords = records.filter(r => r.rpe);
  const avgRpe = rpeRecords.length ? (rpeRecords.reduce((a, r) => a + r.rpe, 0) / rpeRecords.length) : null;
  const cur = profile?.currentMax || null;
  const gain = latestRpeRM - firstRpeRM;
  // 目標達成率は「MAXテスト日の実測」に基づく基準1RM(trainingMax)を優先する。
  // 練習日(ボリューム/テクニック/メイン)の推定値だけで達成率が動くと、
  // 計画通りにこなしただけの数字で一喜一憂することになるため。
  const tm = profile?.trainingMax ?? null;
  const dispRM = tm ?? latestRpeRM;
  let progress = null;
  if (cur && targetMax && targetMax > cur) {
    progress = Math.max(0, Math.min(100, (dispRM - cur) / (targetMax - cur) * 100));
  }

  let html = '';

  // ===== コンディション5段階評価カード =====
  const cond = analyzeCondition();
  if (cond) {
    html += `<div class="card" style="border:1px solid ${cond.color}66">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0">🩺 コンディション分析</div>
        <div style="font-size:20px;font-weight:800;color:${cond.color}">${cond.emoji} ${cond.label}</div>
      </div>
      <div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden"><div style="height:8px;border-radius:4px;width:${cond.score}%;background:${cond.color};transition:width .5s"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px">
        <span>全然不調</span><span>やや不調</span><span>普通</span><span>やや好調</span><span>絶好調</span>
      </div>
      <ul style="margin:10px 0 0;padding-left:18px">
        ${cond.reasons.map(r => `<li style="font-size:13px;color:var(--text2);line-height:1.7">${r}</li>`).join('')}
      </ul>
      ${cond.suggest ? `<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--text);line-height:1.6">💡 ${cond.suggest}</div>` : ''}
      <button class="btn btn-outline btn-sm" onclick="proposeAdjustFromAnalysis()" style="width:100%;margin-top:12px">📋 記録を分析してメニューを見直す</button>
    </div>`;
  }

  // サマリー統計カード
  html += `<div class="stat-grid">
    <div class="stat-box"><div class="stat-val">${tm ?? '—'}</div><div class="stat-unit">${tm != null ? 'kg' : ''}</div><div class="stat-lbl">基準1RM<br>(MAXテスト実測)</div></div>
    <div class="stat-box"><div class="stat-val">${latestRpeRM}</div><div class="stat-unit">kg</div><div class="stat-lbl">現在の推定1RM<br>(RPE補正・最新)</div></div>
    <div class="stat-box"><div class="stat-val">${gain >= 0 ? '+' : ''}${gain}</div><div class="stat-unit">kg</div><div class="stat-lbl">開始からの伸び</div></div>
    <div class="stat-box"><div class="stat-val">${progress !== null ? Math.round(progress) : '—'}</div><div class="stat-unit">${progress !== null ? '%' : ''}</div><div class="stat-lbl">目標達成率</div></div>
    <div class="stat-box"><div class="stat-val">${avgRpe !== null ? avgRpe.toFixed(1) : '—'}</div><div class="stat-unit"></div><div class="stat-lbl">平均RPE</div></div>
  </div>`;

  if (targetMax && cur) {
    html += `<div class="card" style="padding:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px">
        <span>${cur}kg（開始）</span><span style="color:var(--accent2)">目標 ${targetMax}kg</span>
      </div>
      <div class="inol-bar-bg" style="height:10px"><div class="inol-bar-fill" style="height:10px;width:${progress || 0}%;background:linear-gradient(90deg,var(--accent),var(--green))"></div></div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px">${tm != null ? '基準1RM(MAXテスト実測)' : 'RPE補正推定1RM(参考値)'} ${dispRM}kg — 目標まであと ${Math.max(0, targetMax - dispRM)}kg</div>
    </div>`;
  }

  // ===== 負荷管理カード（ACWR + モノトニー/ストレイン） =====
  const acwr = calcACWR();
  const fm = fosterMetrics();
  if (acwr || fm) {
    let acwrHtml = '';
    if (acwr) {
      if (acwr.established && acwr.ratio != null) {
        const r = acwr.ratio;
        const col = r > 1.5 ? 'var(--red)' : r > 1.3 ? 'var(--yellow)' : r >= 0.8 ? 'var(--green)' : '#60a5fa';
        const mark = r > 1.5 ? '✕' : r > 1.3 ? '△' : r >= 0.8 ? '◎' : '△';
        const lbl = r > 1.5 ? '危険（負荷急増）' : r > 1.3 ? '注意' : r >= 0.8 ? '最適' : '負荷不足気味';
        const barPct = Math.min(100, r / 2 * 100);
        acwrHtml = `
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <span style="font-size:13px">ACWR（急性:慢性負荷比）</span>
            <span style="font-weight:800;color:${col}">${r.toFixed(2)} <span style="font-size:12px">${mark} ${lbl}</span></span>
          </div>
          <div style="position:relative;background:linear-gradient(90deg,#60a5fa 0 40%,var(--green) 40% 65%,var(--yellow) 65% 75%,var(--red) 75% 100%);border-radius:4px;height:8px">
            <div style="position:absolute;left:${barPct}%;top:-3px;width:3px;height:14px;background:#fff;border-radius:2px"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:3px">
            <span>0</span><span>0.8</span><span>1.3</span><span>1.5</span><span>2.0+</span>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-top:6px">直近7日の負荷 ${(acwr.acute/1000).toFixed(1)}t ÷ 過去28日の週平均 ${(acwr.chronicWeekly/1000).toFixed(1)}t。0.8〜1.3が怪我リスクの低い安全域（Gabbett）。</div>`;
      } else {
        acwrHtml = `<div style="font-size:13px;color:var(--text2)">ACWR（急性:慢性負荷比）: 算出中 — 3週間以上の記録が貯まると表示されます。</div>`;
      }
    }
    let fmHtml = '';
    if (fm) {
      const mcol = fm.monotony > 2.0 ? 'var(--red)' : fm.monotony > 1.5 ? 'var(--yellow)' : 'var(--green)';
      const mmark = fm.monotony > 2.0 ? '✕' : fm.monotony > 1.5 ? '△' : '◎';
      const mlbl = fm.monotony > 2.0 ? '単調すぎ' : fm.monotony > 1.5 ? 'やや単調' : '良好（メリハリあり）';
      fmHtml = `<div class="divider"></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">
          <span>モノトニー（負荷の単調さ）</span><span style="font-weight:800;color:${mcol}">${fm.monotony.toFixed(2)} <span style="font-size:12px">${mmark} ${mlbl}</span></span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px">
          <span>週間ストレイン</span><span style="font-weight:700">${Math.round(fm.strain)}</span>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:6px">モノトニーが2.0を超えると毎日同じ負荷が続いている状態で、オーバートレーニングのリスクが上がります（Foster）。高負荷日と軽い日のメリハリが有効です。</div>`;
    }
    html += `<div class="card"><div class="card-title">🛡️ 負荷管理（怪我・疲労リスク）</div>${acwrHtml}${fmHtml}</div>`;
  }

  // ===== 目標達成予測カード（線形回帰） =====
  const fc = regressionForecast();
  if (fc && targetMax) {
    const pace = fc.perWeek;
    const paceCol = pace > 0 ? 'var(--green)' : 'var(--red)';
    let fcBody = `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
      <span>現在の伸びペース</span><span style="font-weight:800;color:${paceCol}">${pace >= 0 ? '+' : ''}${pace.toFixed(1)}kg/週</span>
    </div>`;
    if (fc.reachDate && pace > 0) {
      const fmtD = d => `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
      fcBody += `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span>目標 ${targetMax}kg 到達予測</span><span style="font-weight:700;color:var(--accent2)">${fmtD(fc.reachDate)}</span>
      </div>`;
      if (fc.planEnd) {
        fcBody += `<div style="display:flex;justify-content:space-between;font-size:13px">
          <span>プログラム終了予定</span><span style="font-weight:700">${fmtD(fc.planEnd)}</span>
        </div>`;
        if (fc.diffWeeks != null && Math.abs(fc.diffWeeks) >= 1) {
          const early = fc.diffWeeks < 0;
          fcBody += `<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px;line-height:1.6">
            ${early ? '📈' : '📉'} 予定より約 <strong>${Math.round(Math.abs(fc.diffWeeks))}週 ${early ? '早い' : '遅い'}</strong> ペースです。${early ? 'メニューの短縮を検討できます。' : '期間延長や負荷調整を検討しましょう。'}</div>`;
        } else {
          fcBody += `<div style="font-size:12px;color:var(--text2);margin-top:8px">ほぼ計画どおりのペースです。</div>`;
        }
      }
    } else {
      fcBody += `<div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.6">📉 現状のペースでは目標到達が困難な見込みです。下の「メニューを見直す」から負荷と期間の再調整をおすすめします。</div>`;
    }
    fcBody += `<div style="font-size:11px;color:var(--text2);margin-top:8px">直近${Math.min(8, records.length)}回のRPE補正推定1RMに線形回帰をかけた予測です。</div>`;
    html += `<div class="card"><div class="card-title">📈 目標達成予測</div>${fcBody}</div>`;
  }

  // 1RM estimate chart
  html += `<div class="card">
    <div class="card-title">推定1RM推移 (kg)</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">実線=RPE補正（実力の推定）／点線=記録ベース${targetMax ? ` ／ 目標 ${targetMax}kg` : ''}</div>
    <div class="chart-wrap"><canvas id="chart-rm"></canvas></div>
    <div style="font-size:11px;color:var(--text2);margin-top:6px">●濃い=MAXテスト(実測) 　●中間=メイン日 　●薄い=ボリューム/テクニック(参考値)</div>
  </div>`;

  // Volume chart
  html += `<div class="card">
    <div class="card-title">セッション総ボリューム (kg)</div>
    <div class="chart-wrap"><canvas id="chart-vol"></canvas></div>
  </div>`;

  // INOL chart
  html += `<div class="card">
    <div class="card-title">INOL 推移</div>
    <div class="chart-wrap"><canvas id="chart-inol"></canvas></div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:12px">
      <span style="color:var(--green)">■ 最適 (0.8-2.0)</span>
      <span style="color:var(--yellow)">■ 高負荷 (2.0-3.0)</span>
    </div>
  </div>`;

  // Max weight achieved
  html += `<div class="card">
    <div class="card-title">実施最大重量 (kg)</div>
    <div class="chart-wrap"><canvas id="chart-maxw"></canvas></div>
  </div>`;

  // Bodyweight chart（体重記録が2件以上あるとき）
  if (state.bodyweights.length >= 2) {
    html += `<div class="card">
      <div class="card-title">体重推移 (kg)</div>
      <div class="chart-wrap"><canvas id="chart-bw"></canvas></div>
    </div>`;
  }

  // Body fat chart（体脂肪率の記録が2件以上あるとき）
  const fatEntries = state.bodyweights.filter(b => b.fat != null);
  if (fatEntries.length >= 2) {
    html += `<div class="card">
      <div class="card-title">体脂肪率推移 (%)</div>
      <div class="chart-wrap"><canvas id="chart-fat"></canvas></div>
    </div>`;
  }

  // 相対筋力チャート（体重比とIPF GLポイント）
  // 「現在」はtrainingMax優先(dispRM)・「開始時」はcurrentMax(cur)という、
  // サマリー統計と同じ検証済みの基準で比較する（練習日の記録1件のブレで
  // 上昇/低下判定が振れないようにするため）。折れ線自体は記録ベースの推移として残す。
  const rel = relStrengthSeries();
  if (rel.labels.length >= 2) {
    const startBw = bwAt(profile?.startDate) || profile?.weight;
    const curRatio = (dispRM && latestBw) ? +(dispRM / latestBw).toFixed(2) : rel.ratio[rel.ratio.length - 1];
    const curGLraw = (dispRM && latestBw) ? ipfGL(dispRM, latestBw) : null;
    const curGL = curGLraw != null ? +curGLraw.toFixed(1) : rel.gl[rel.gl.length - 1];
    const startRatio = (cur && startBw) ? cur / startBw : rel.ratio[0];
    const relDelta = curRatio - startRatio;
    const relCol = relDelta > 0.02 ? 'var(--green)' : relDelta < -0.02 ? 'var(--red)' : 'var(--text2)';
    const relMark = relDelta > 0.02 ? '📈 上昇中＝良好' : relDelta < -0.02 ? '📉 低下＝要注意（回復不足や過度な減量の可能性）' : '➡️ 横ばい';
    html += `<div class="card">
      <div class="card-title">相対筋力の推移</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">現在: 体重比 <strong style="color:var(--accent2)">${curRatio.toFixed(2)}倍</strong>${curGL != null ? ` ／ IPF GL <strong style="color:#a78bfa">${curGL.toFixed(1)}pt</strong>` : ''}${!tm ? '<br><span style="font-size:11px">（MAXテスト未実施のため参考値）</span>' : ''}</div>
      <div class="chart-wrap"><canvas id="chart-rel"></canvas></div>
      <div style="font-size:13px;font-weight:700;color:${relCol};margin-top:8px">${relMark}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px">体重比＝体重が変わっても「本当の実力」を追える指標。折れ線は記録ベースの推移（●濃い=MAXテスト実測／●薄い=練習日の参考値）、上の数値は基準1RMベース。IPF GLポイントは体重を考慮した実力の総合点（大会の順位付けにも使われる公式指標）。</div>
    </div>`;
  }

  // Weekly average RPE chart
  const wrpe = weeklyRpeSeries();
  if (wrpe.data.length >= 2) {
    html += `<div class="card">
      <div class="card-title">週ごとの平均RPE推移</div>
      <div class="chart-wrap"><canvas id="chart-wrpe"></canvas></div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px">右肩上がりは疲労蓄積のサイン。ディロードや期間延長の目安になります。</div>
    </div>`;
  }


  document.getElementById('analysis-content').innerHTML = html;

  // Render charts
  const baseDataset = (data, color) => ({
    data, borderColor: color, backgroundColor: color + '33',
    fill: true, tension: 0.4, pointBackgroundColor: color,
    pointRadius: 4, pointHoverRadius: 6, borderWidth: 2,
  });

  // RM chart with target line
  // 各点の色・大きさを日タイプ/信頼度で変える（MAXテスト日=濃い・大きめ、ボリューム/テクニック日=薄い・小さめ）
  const sessAll = records.map(r => sessionForRecord(r));
  const confsAll = records.map((r, i) => e1rmConfidence(r, sessAll[i]));
  const pointColorsAll = records.map((r, i) => confPointColor(!!sessAll[i]?.isMaxDay, confsAll[i]));
  const pointRadiiAll = records.map((r, i) => confPointRadius(!!sessAll[i]?.isMaxDay, confsAll[i]));
  const rmDatasets = [
    { ...baseDataset(rpeRMs, '#3b82f6'), label: 'RPE補正',
      pointBackgroundColor: pointColorsAll, pointRadius: pointRadiiAll },
    { ...baseDataset(estRMs, '#64748b'), label: '記録ベース',
      fill: false, backgroundColor: 'transparent', borderDash: [4,3], borderWidth: 1.5, pointRadius: 2 },
  ];
  if (targetMax) {
    rmDatasets.push({
      data: Array(labels.length).fill(targetMax),
      borderColor: '#f59e0b', borderDash: [6,4], borderWidth: 1.5,
      pointRadius: 0, backgroundColor: 'transparent', tension: 0,
      label: '目標'
    });
  }

  charts.rm = new Chart(document.getElementById('chart-rm'), {
    type: 'line',
    data: { labels, datasets: rmDatasets },
    options: { ...chartDefaults, plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 } } } } }
  });

  charts.vol = new Chart(document.getElementById('chart-vol'), {
    type: 'bar',
    data: { labels, datasets: [{ ...baseDataset(volumes, '#22c55e'), backgroundColor: '#22c55e33', borderRadius: 6 }] },
    options: chartDefaults
  });

  // INOL with colored background zones
  charts.inol = new Chart(document.getElementById('chart-inol'), {
    type: 'line',
    data: { labels, datasets: [baseDataset(inols, '#f59e0b')] },
    options: {
      ...chartDefaults,
      plugins: {
        ...chartDefaults.plugins,
        annotation: undefined
      }
    }
  });

  charts.maxw = new Chart(document.getElementById('chart-maxw'), {
    type: 'line',
    data: { labels, datasets: [baseDataset(maxWeights, '#a78bfa')] },
    options: chartDefaults
  });

  // 体重推移チャート
  if (state.bodyweights.length >= 2) {
    const bwLabels = state.bodyweights.map(b => fmtDate(b.date));
    const bwData = state.bodyweights.map(b => b.weight);
    charts.bw = new Chart(document.getElementById('chart-bw'), {
      type: 'line',
      data: { labels: bwLabels, datasets: [baseDataset(bwData, '#f472b6')] },
      options: chartDefaults
    });
  }

  // 体脂肪率チャート
  if (fatEntries.length >= 2) {
    charts.fat = new Chart(document.getElementById('chart-fat'), {
      type: 'line',
      data: { labels: fatEntries.map(b => fmtDate(b.date)), datasets: [baseDataset(fatEntries.map(b => b.fat), '#fbbf24')] },
      options: chartDefaults
    });
  }

  // 相対筋力チャート（体重比＝左軸、IPF GL＝右軸の2軸）
  if (rel.labels.length >= 2) {
    const relPointColors = rel.confs.map((c, i) => confPointColor(rel.isMax[i], c));
    const relPointRadii = rel.confs.map((c, i) => confPointRadius(rel.isMax[i], c));
    const relDatasets = [{ ...baseDataset(rel.ratio, '#22d3ee'), label: '体重比 (倍)', yAxisID: 'y',
      pointBackgroundColor: relPointColors, pointRadius: relPointRadii }];
    if (rel.gl.some(g => g != null)) {
      relDatasets.push({ ...baseDataset(rel.gl, '#a78bfa'), label: 'IPF GL (pt)', yAxisID: 'y2',
        fill: false, backgroundColor: 'transparent', borderDash: [4,3], borderWidth: 1.5, pointRadius: 2 });
    }
    charts.rel = new Chart(document.getElementById('chart-rel'), {
      type: 'line',
      data: { labels: rel.labels, datasets: relDatasets },
      options: {
        ...chartDefaults,
        plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 } } } },
        scales: {
          ...chartDefaults.scales,
          y2: { position: 'right', ticks: { color: '#a78bfa', font: { size: 11 } }, grid: { display: false } }
        }
      }
    });
  }

  // 週平均RPEチャート
  if (wrpe.data.length >= 2) {
    charts.wrpe = new Chart(document.getElementById('chart-wrpe'), {
      type: 'line',
      data: { labels: wrpe.labels, datasets: [baseDataset(wrpe.data, '#f59e0b')] },
      options: chartDefaults
    });
  }

}

// ===== NAV =====
let activeTab = 'setup';
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'setup') {
    document.getElementById('screen-setup').classList.add('active');
    document.getElementById('headerTitle').textContent = 'BenchPress Pro';
    document.getElementById('headerSub').textContent = '初期設定';
    // Initialize date
    if (!document.getElementById('s-start-date').value) {
      const today = new Date();
      document.getElementById('s-start-date').value = today.toISOString().split('T')[0];
    }
    return;
  }

  // Check if program exists for non-setup tabs
  if (!state.program && tab !== 'theory') {
    switchTab('setup'); return;
  }

  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`)?.classList.add('active');
  activeTab = tab;

  const titles = { program:'プログラム', training:'トレーニング', records:'記録管理', analysis:'データ分析', theory:'トレーニング理論' };
  document.getElementById('headerTitle').textContent = titles[tab] || '';
  document.getElementById('headerSub').textContent = state.profile ? `${state.profile.trainingMax ?? state.profile.currentMax}kg → ${state.profile.targetMax}kg` : '';

  if (tab === 'program') renderProgram();
  if (tab === 'records') renderRecords();
  if (tab === 'analysis') renderAnalysis();
  if (tab === 'theory') renderTheory();
  if (tab === 'training' && state.currentSession) renderTraining(state.currentSession);
}

// ===== INIT =====
function init() {
  // Register SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  if (state.program) {
    switchTab('program');
  } else {
    switchTab('setup');
    const today = new Date();
    document.getElementById('s-start-date').value = today.toISOString().split('T')[0];
    // Pre-fill if profile exists
    if (state.profile) {
      const p = state.profile;
      document.getElementById('s-age').value = p.age;
      document.getElementById('s-weight').value = p.weight;
      document.getElementById('s-height').value = p.height;
      document.getElementById('s-gender').value = p.gender;
      document.getElementById('s-current-max').value = p.currentMax;
      document.getElementById('s-target-max').value = p.targetMax;
      updateWeeksProposal();
    }
  }

  // 推奨週数のライブ更新（現状・目標を変えるたびに再計算）
  ['s-current-max', 's-target-max'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updateWeeksProposal);
    if (el) el.addEventListener('change', updateWeeksProposal);
  });
}

// Reset program
function resetProgram() {
  if (!confirm('プログラムをリセットして再設定しますか？')) return;
  state.program = null;
  state.currentSession = null;
  state.completedSessions = {};
  save();
  switchTab('setup');
}

// Close modals on overlay click
document.getElementById('workoutModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('logModal').addEventListener('click', function(e) {
  if (e.target === this) closeLogModal();
});
function closeModal() { document.getElementById('workoutModal').classList.remove('open'); }

init();
</script>
</body>
</html>
